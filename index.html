<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ОГЭ Геометрия</title>
<style>
  :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    background: var(--bg); 
    margin: 0; 
    padding: 0; 
    display: flex; 
    justify-content: center; 
    min-height: 100vh; 
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }
  .app { 
    width: 100%; max-width: 500px; background: white; height: 100vh; height: -webkit-fill-available;
    display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow: hidden; 
  }
  header { background: var(--primary); color: white; padding: 12px 15px; text-align: center; flex-shrink: 0; }
  h1 { margin: 0; font-size: 18px; font-weight: bold; }
  .tabs { display: flex; border-bottom: 2px solid #e2e8f0; flex-shrink: 0; }
  .tab { flex: 1; padding: 15px 10px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; color: #94a3b8; transition: 0.2s; background: white; -webkit-appearance: none; }
  .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #eff6ff; }
  .tab.exam-tab.active { color: #ea580c; border-color: #ea580c; background: #fff7ed; }
  .screen { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px; -webkit-overflow-scrolling: touch; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  .exam-dash { display: none; background: #fffbeb; border: 1px solid #fcd34d; padding: 12px; border-radius: 10px; width: 100%; text-align: center; margin-bottom: 15px; font-size: 14px; }
  .exam-dash.show { display: block; }
  .score-text { font-size: 18px; font-weight: bold; color: #ea580c; }
  .win-msg { color: var(--success); font-weight: bold; display: none; margin-top: 5px; animation: popIn 0.3s; }
  .grid-numbers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 15px; }
  .num-btn { aspect-ratio: 1; border: 2px solid #cbd5e1; border-radius: 12px; background: white; font-size: 16px; font-weight: bold; color: #334155; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; user-select: none; min-height: 60px; -webkit-appearance: none; touch-action: manipulation; }
  .num-btn:hover { background: #eff6ff; border-color: var(--primary); }
  .num-btn:active { transform: scale(0.95); }
  .num-btn.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }
  .num-btn.solved { background: #dcfce7; border-color: var(--success); color: #166534; }
  .num-btn.solved::after { content: '✓'; position: absolute; top: 2px; right: 4px; font-size: 14px; font-weight: 900; }
  .sub-nav { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; margin-bottom: 12px; }
  .sub-nav.active { display: grid; }
  .sub-btn { padding: 12px 8px; border: 1px solid #cbd5e1; border-radius: 8px; background: #f8fafc; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; transition: 0.2s; text-align: center; user-select: none; -webkit-appearance: none; touch-action: manipulation; min-height: 44px; }
  .sub-btn:hover { background: #eff6ff; border-color: var(--primary); }
  .sub-btn:active { transform: scale(0.95); }
  .sub-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .task-card { width: 100%; animation: slideUp 0.3s; }
  .meta { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 8px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }
  .canvas-box { width: 100%; height: 200px; background: #ffffff; border: 2px solid #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative; overflow: hidden; flex-shrink: 0; }
  svg, img { width: 100%; height: 100%; max-width: 280px; max-height: 180px; object-fit: contain; }
  .reaction-box { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 10px; }
  .reaction-emoji { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }
  .reaction-text { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .reaction-text.ok { color: var(--success); }
  .reaction-text.fail { color: var(--danger); }
  .question { font-size: 16px; line-height: 1.5; text-align: left; margin-bottom: 15px; font-weight: 500; color: #1e293b; padding: 0 5px; }
  input[type="number"] { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 14px; outline: none; box-sizing: border-box; -webkit-appearance: none; }
  input:focus { border-color: var(--primary); }
  .actions { display: flex; gap: 8px; width: 100%; }
  .btn-action { flex: 1; padding: 15px 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; transition: 0.2s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: 48px; -webkit-appearance: none; touch-action: manipulation; }
  .btn-action:active { transform: scale(0.95); opacity: 0.9; }
  .btn-primary { background: var(--primary); }
  .btn-success { background: var(--success); }
  .btn-back { background: #cbd5e1; color: #334155; }
  .btn-finish { background: #ea580c; width: 100%; display: none; margin-top: 10px; min-height: 48px; }
  .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .feedback { padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; display: none; margin-bottom: 10px; font-size: 15px; }
  .fb-ok { background: #dcfce7; color: #166534; display: block; }
  .fb-no { background: #fee2e2; color: #991b1b; display: block; }
  .solution { background: #f1f5f9; padding: 15px; border-left: 4px solid var(--primary); color: #334155; font-size: 14px; display: none; white-space: pre-wrap; line-height: 1.5; border-radius: 0 8px 8px 0; margin-bottom: 10px; word-wrap: break-word; }
  .solution.correct-style { border-color: var(--success); color: var(--success); font-weight: bold; font-size: 16px; text-align: center; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @media (max-height: 650px) { .canvas-box { height: 160px; } .reaction-emoji { font-size: 40px; } .reaction-text { font-size: 16px; } header { padding: 10px 15px; } h1 { font-size: 16px; } }
</style>
</head>
<body>
<div class="app">
  <header><h1>ОГЭ ГЕОМЕТРИЯ</h1></header>
  <div class="tabs">
    <button class="tab active" id="tab-train">Тренировка</button>
    <button class="tab exam-tab" id="tab-exam">ЭКЗАМЕН</button>
  </div>
  <div id="menu-screen" class="screen active">
    <div id="exam-info" class="exam-dash">Для сдачи нужно решить любые <strong>2 задачи</strong>.<br>Готово: <span class="score-text" id="score-val">0 / 2</span><div id="win-msg" class="win-msg">🎉 ЭКЗАМЕН СДАН! 🎉</div></div>
    <div style="font-size:14px; color:#64748b; margin-bottom:8px;">Выбери номер задания:</div>
    <div class="grid-numbers">
      <div class="num-btn" data-num="15">15</div><div class="num-btn" data-num="16">16</div><div class="num-btn" data-num="17">17</div><div class="num-btn" data-num="18">18</div>
      <div class="num-btn" data-num="19">19</div><div class="num-btn" data-num="23">23</div><div class="num-btn" data-num="24">24</div><div class="num-btn" data-num="25">25</div>
    </div>
    <button class="btn-action btn-primary" id="btn-generate">🚀 Генерировать задачу</button>
  </div>
  <div id="task-screen" class="screen">
    <div class="task-card">
      <div class="meta"><span id="lbl-type">Тип</span><span id="lbl-num">№?</span></div>
      <div id="sub-menu-15" class="sub-nav">
        <button class="sub-btn" data-sub="0">Углы</button><button class="sub-btn" data-sub="1">Общие треугольники</button>
        <button class="sub-btn" data-sub="2">Равнобедренные</button><button class="sub-btn" data-sub="3">Прямоугольные</button>
      </div>
      <div class="canvas-box" id="drawing-area"></div>
      <div id="q-text" class="question">...</div>
      <input type="number" id="inp-ans" placeholder="Введите ответ" step="any">
      <div id="msg-fb" class="feedback"></div><div id="sol-txt" class="solution"></div>
      <div class="actions">
        <button class="btn-action btn-back" id="btn-back">❌ Меню</button>
        <button class="btn-action btn-success" id="btn-check">Проверить</button>
        <button class="btn-action btn-primary" id="btn-continue" style="display: none;">➡ Продолжить</button>
      </div>
      <button class="btn-action btn-finish" id="btn-finish">🏁 Завершить экзамен</button>
    </div>
  </div>
</div>
<script>
var appState = { mode: 'train', num: null, params: null, solved: [], subIndex: 0, currentSvg: null, taskQueue: {} };

// 👇 SVG: ПАРАЛЛЕЛЬНЫЕ ПРЯМЫЕ (ИДЕАЛЬНЫЙ)
var PARALLEL_SVG = '<svg viewBox="0 0 1100 800" width="100%" height="100%" style="background:white;">' +
   '<line x1="0" y1="200" x2="1100" y2="200" stroke="#c00000" stroke-width="4" stroke-linecap="round"/>' +
   '<line x1="0" y1="600" x2="1100" y2="600" stroke="#c00000" stroke-width="4" stroke-linecap="round"/>' +
   '<line x1="0" y1="700" x2="600" y2="100" stroke="#c00000" stroke-width="4" stroke-linecap="round"/>' +
   '<line x1="400" y1="100" x2="1000" y2="700" stroke="#c00000" stroke-width="4" stroke-linecap="round"/>' +
   '<path d="M 500 200 L 410 200 A 90 90 0 0 0 436 263 Z" fill="#92d050" opacity="0.9"/>' +
   '<path d="M 500 200 L 564 264 A 90 90 0 0 0 590 200 Z" fill="#ff0000" opacity="0.9"/>' +
   '<path d="M 900 600 L 964 664 A 90 90 0 0 0 990 600 Z" fill="#ff0000" opacity="0.9"/>' +
   '<path d="M 100 600 L 36 664 A 90 90 0 0 0 190 600 Z" fill="#0070c0" opacity="0.9"/>' +
   '<text x="380" y="290" font-size="48" font-style="italic" fill="black" font-weight="bold">1</text>' +
   '<text x="590" y="260" font-size="48" font-style="italic" fill="black" font-weight="bold">2</text>' +
   '<text x="990" y="660" font-size="48" font-style="italic" fill="black" font-weight="bold">2</text>' +
   '<text x="150" y="760" font-size="48" font-style="italic" fill="black" font-weight="bold">3</text>' +
   '</svg>';

// 👇 SVG: ТРАПЕЦИЯ + СРЕДНЯЯ ЛИНИЯ
var TRAPEZOID_SVG = '<svg viewBox="0 0 400 400" width="100%" height="100%" style="background:white;">' +
   '<path d="M 50 350 L 350 350 L 275 200 L 125 200 Z" fill="#ffcccc" stroke="#c00000" stroke-width="3"/>' +
   '<path d="M 125 200 L 275 200 L 200 50 Z" fill="#e2f0d9" stroke="#c00000" stroke-width="3"/>' +
   '<line x1="125" y1="200" x2="275" y2="200" stroke="#00b0f0" stroke-width="3"/>' +
   '<text x="15" y="370" font-family="serif" font-size="35" font-style="italic" fill="black">A</text>' +
   '<text x="190" y="40" font-family="serif" font-size="35" font-style="italic" fill="black">B</text>' +
   '<text x="360" y="370" font-family="serif" font-size="35" font-style="italic" fill="black">C</text>' +
   '<text x="85" y="210" font-family="serif" font-size="35" font-style="italic" fill="black">D</text>' +
   '<text x="290" y="210" font-family="serif" font-size="35" font-style="italic" fill="black">E</text>' +
   '</svg>';

// 👇 SVG: МЕДИАНА (НОВЫЙ РИСУНОК)
var MEDIAN_SVG = '<svg viewBox="0 0 400 350" width="100%" height="100%" style="background:white;">' +
   '<polygon points="50,300 220,50 200,300" fill="#FFFACD" stroke="#00CED1" stroke-width="3"/>' +
   '<polygon points="200,300 220,50 350,300" fill="#F0FFF0" stroke="#00CED1" stroke-width="3"/>' +
   '<line x1="220" y1="50" x2="200" y2="300" stroke="#00CED1" stroke-width="3"/>' +
   '<line x1="50" y1="300" x2="350" y2="300" stroke="#00CED1" stroke-width="3"/>' +
   '<line x1="125" y1="290" x2="125" y2="310" stroke="#00CED1" stroke-width="3"/>' +
   '<line x1="275" y1="290" x2="275" y2="310" stroke="#00CED1" stroke-width="3"/>' +
   '<text x="30" y="330" font-family="serif" font-size="48" font-style="italic" fill="black">A</text>' +
   '<text x="210" y="40" font-family="serif" font-size="48" font-style="italic" fill="black">B</text>' +
   '<text x="360" y="330" font-family="serif" font-size="48" font-style="italic" fill="black">C</text>' +
   '<text x="190" y="340" font-family="serif" font-size="48" font-style="italic" fill="black">D</text>' +
   '</svg>';

var TASKS_DB = {
  15: {
    title: 'Треугольники и их элементы',
    subTopics: {
      0: { // Углы
        name: 'Углы',
        tasks: [
          { gen: function(){ return {angle: (Math.floor(Math.random() * 30) + 10) * 2}; },
            txt: function(p){ return 'В △ABC известно, что ∠ACB = ' + p.angle + '°. CD — биссектриса. Найдите угол ACD.'; }, 
            solRight: function(p){ return 'МОЛОДЕЦ! ✅ Правильно, ' + (p.angle/2) + '°.'; },
            solWrong: function(p){ return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Биссектриса, как ты понимаешь, режет угол ровно напополам — это база. Так что без танцев с бубном берём ' + p.angle + '° и просто делим на 2. Считаем: ' + p.angle + '° / 2 = ' + (p.angle/2) + '°. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; },
            ans: function(p){ return p.angle / 2; },
            svg: function(p){ return '<svg viewBox="0 0 300 220" width="280" height="190"><polygon points="30,190 90,110 270,190" fill="#b3e0ff" stroke="none"/><polygon points="150,30 90,110 270,190" fill="#ffb3c1" stroke="none"/><line x1="30" y1="190" x2="150" y2="30" stroke="#bf360c" stroke-width="2"/><line x1="150" y1="30" x2="270" y2="190" stroke="#bf360c" stroke-width="2"/><line x1="270" y1="190" x2="30" y2="190" stroke="#bf360c" stroke-width="2"/><line x1="270" y1="190" x2="90" y2="110" stroke="#bf360c" stroke-width="2"/><path d="M 235,190 A 35,35 0 0,1 237,177" fill="none" stroke="#000" stroke-width="1.5"/><path d="M 237,177 A 35,35 0 0,1 249,162" fill="none" stroke="#000" stroke-width="1.5"/><text x="20" y="205" font-size="18" fill="#000000" font-weight="bold">A</text><text x="145" y="25" font-size="18" fill="#000000" font-weight="bold">B</text><text x="275" y="205" font-size="18" fill="#000000" font-weight="bold">C</text><text x="75" y="105" font-size="14" fill="#000000" font-weight="bold">D</text></svg>'; }
          },
          { gen: function(){ var a1 = Math.floor(Math.random() * 40) + 40; var a2 = Math.floor(Math.random() * 40) + 40; return {angleA: a1, angleB: a2}; },
            txt: function(p){ return 'В треугольнике два угла равны ' + p.angleA + '° и ' + p.angleB + '°. Найдите третий угол. Ответ дайте в градусах.'; }, 
            solRight: function(p){ var a3 = 180 - p.angleA - p.angleB; return 'МОЛОДЕЦ! ✅ Правильно, ' + a3 + '°.'; },
            solWrong: function(p){ var a3 = 180 - p.angleA - p.angleB; return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Сумма углов в треугольнике — это 180°, это база. Так что без танцев с бубном отнимаем известные: 180° - ' + p.angleA + '° - ' + p.angleB + '° = ' + a3 + '°. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; },
            ans: function(p){ return 180 - p.angleA - p.angleB; },
            svg: function(p){ return '<svg viewBox="0 0 300 220" width="280" height="190"><polygon points="150,30 30,190 270,190" fill="#ffb3c1" stroke="none"/><line x1="150" y1="30" x2="30" y2="190" stroke="#bf360c" stroke-width="2"/><line x1="30" y1="190" x2="270" y2="190" stroke="#bf360c" stroke-width="2"/><line x1="270" y1="190" x2="150" y2="30" stroke="#bf360c" stroke-width="2"/><text x="20" y="205" font-size="18" fill="#000000" font-weight="bold">A</text><text x="145" y="25" font-size="18" fill="#000000" font-weight="bold">B</text><text x="275" y="205" font-size="18" fill="#000000" font-weight="bold">C</text></svg>'; }
          },
          { gen: function(){ return {angle1: Math.floor(Math.random() * 40) + 40}; },
            txt: function(p){ return 'Найдите угол 3, если угол 1 равен ' + p.angle1 + '°.'; }, 
            solRight: function(p){ var angle3 = 180 - p.angle1; return 'МОЛОДЕЦ! ✅ Правильно, ' + angle3 + '°.'; },
            solWrong: function(p){ var angle3 = 180 - p.angle1; return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Угол 1 и угол 3 — односторонние углы при параллельных прямых. Их сумма 180°, это база. Так что без танцев с бубном: 180° - ' + p.angle1 + '° = ' + angle3 + '°. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; },
            ans: function(p){ return 180 - p.angle1; },
            svg: function(p){ return PARALLEL_SVG; }
          }
        ]
      },
      1: { // 👇 ОБЩИЕ ТРЕУГОЛЬНИКИ (6 ЗАДАЧ)
        name: 'Общие треугольники',
        tasks: [
          // ЗАДАЧА 1: Длина средней линии (Найти DE)
          { 
            gen: function(){ var ac = (Math.floor(Math.random() * 20) + 10) * 2; return {ac: ac, de: ac / 2}; },
            txt: function(p){ return 'DE — средняя линия △ABC. Найдите DE, если AC = ' + p.ac + '.'; }, 
            solRight: function(p){ return 'МОЛОДЕЦ! ✅ Правильно, ' + p.de + '. Средняя линия треугольника равна половине основания — это база!'; },
            solWrong: function(p){ var de = p.ac / 2; return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Средняя линия треугольника параллельна основанию и равна его половине. Так что без танцев с бубном: ' + p.ac + ' / 2 = ' + de + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; },
            ans: function(p){ return p.de; },
            svg: function(p){ return TRAPEZOID_SVG; }
          },
          // ЗАДАЧА 2: Площадь (Дано DBE, найти ABC)
          { 
            gen: function(){ var dbe = Math.floor(Math.random() * 191) + 9; return {dbe: dbe, abc: dbe * 4}; },
            txt: function(p){ return 'В треугольнике ABC DE — средняя линия. Площадь треугольника DBE равна ' + p.dbe + '. Найдите площадь треугольника ABC.'; }, 
            solRight: function(p){ return 'МОЛОДЕЦ! ✅ Правильно, ' + p.abc + '. Средняя линия отсекает подобный треугольник DBE с коэффициентом 1/2, значит площадь относится как 1:4 — это база!'; },
            solWrong: function(p){ var abc = p.dbe * 4; return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Средняя линия делит треугольник так, что маленький треугольник DBE подобен большому ABC с коэффициентом 1/2. Площади подобных фигур относятся как квадрат коэффициента подобия, то есть (1/2)² = 1/4. Значит площадь ABC в 4 раза больше: ' + p.dbe + ' × 4 = ' + abc + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; },
            ans: function(p){ return p.abc; },
            svg: function(p){ return TRAPEZOID_SVG; }
          },
          // ЗАДАЧА 3: Площадь (Дано ABC, найти DBE)
          { 
            gen: function(){ 
              var dbe = Math.floor(Math.random() * 191) + 10; 
              return {dbe: dbe, abc: dbe * 4}; 
            },
            txt: function(p){ return 'В треугольнике ABC DE — средняя линия. Площадь треугольника ABC равна ' + p.abc + '. Найдите площадь треугольника DBE.'; }, 
            solRight: function(p){ return 'МОЛОДЕЦ! ✅ Правильно, ' + p.dbe + '. Площадь маленького треугольника в 4 раза меньше большого — это база!'; },
            solWrong: function(p){ 
              return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Средняя линия отсекает маленький треугольник, подобный большому с коэффициентом 1/2. Площади относятся как квадрат коэффициента (1/4). Значит, чтобы найти маленькую площадь, надо большую разделить на 4: ' + p.abc + ' / 4 = ' + p.dbe + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
            },
            ans: function(p){ return p.dbe; },
            svg: function(p){ return TRAPEZOID_SVG; }
          },
          // ЗАДАЧА 4: Даны отрезки AD, DB, DE. Найти AC.
          { 
            gen: function(){ 
              var de = Math.floor(Math.random() * 21) + 10; 
              var ad = Math.floor(Math.random() * 11) + 10; 
              return {ad: ad, db: ad, de: de, ac: de * 2}; 
            },
            txt: function(p){ 
              return 'В треугольнике ABC DE — средняя линия. Дано: AD = ' + p.ad + ', DB = ' + p.db + ', DE = ' + p.de + '. Найдите AC.'; 
            }, 
            solRight: function(p){ 
              return 'МОЛОДЕЦ! ✅ Правильно, ' + p.ac + '. Средняя линия в два раза меньше основания, значит AC = DE × 2 = ' + p.de + ' × 2 = ' + p.ac + '. Это база!'; 
            },
            solWrong: function(p){ 
              return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Если DE — средняя линия, то она равна половине основания AC. Нам не нужны AD и DB, они лишь подтверждают, что D — середина. Просто умножаем DE на 2: ' + p.de + ' × 2 = ' + p.ac + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
            },
            ans: function(p){ return p.ac; },
            svg: function(p){ return TRAPEZOID_SVG; }
          },
          // 👇 ЗАДАЧА 5: Медиана. Дано AC, найти AD. (С добавленной медианой BD)
          { 
            gen: function(){ 
              var ac = (Math.floor(Math.random() * 20) + 10) * 2; 
              var bd = Math.floor(Math.random() * 15) + 5; // Длина медианы (лишняя инфа)
              return {ac: ac, ad: ac / 2, bd: bd}; 
            },
            txt: function(p){ 
              var target = Math.random() > 0.5 ? 'AD' : 'DC';
              return 'В треугольнике ABC BD — медиана, BD = ' + p.bd + '. AC = ' + p.ac + '. Найдите ' + target + '.'; 
            },
            solRight: function(p){ 
              return 'МОЛОДЕЦ! ✅ Правильно, ' + p.ad + '. Медиана делит сторону пополам, значит ' + p.ac + ' / 2 = ' + p.ad + '. Это база!'; 
            },
            solWrong: function(p){ 
              return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Медиана BD делит сторону AC на две равные части. Длина самой медианы (' + p.bd + ') тут ни при чём. Значит, чтобы найти половину, делим целое на 2: ' + p.ac + ' / 2 = ' + p.ad + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
            },
            ans: function(p){ return p.ad; },
            svg: function(p){ return MEDIAN_SVG; }
          },
          // 👇 ЗАДАЧА 6: Медиана. Дано AD, найти AC. (С добавленной медианой BD)
          { 
            gen: function(){ 
              var ad = Math.floor(Math.random() * 20) + 5; 
              var bd = Math.floor(Math.random() * 15) + 5; // Длина медианы (лишняя инфа)
              return {ac: ad * 2, ad: ad, bd: bd}; 
            },
            txt: function(p){ 
              return 'В треугольнике ABC BD — медиана, BD = ' + p.bd + '. AD = ' + p.ad + '. Найдите AC.'; 
            },
            solRight: function(p){ 
              return 'МОЛОДЕЦ! ✅ Правильно, ' + p.ac + '. Медиана делит сторону пополам, значит AC в 2 раза больше AD: ' + p.ad + ' × 2 = ' + p.ac + '. Это база!'; 
            },
            solWrong: function(p){ 
              return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Медиана BD делит сторону AC пополам. Длина самой медианы (' + p.bd + ') тут ни при чём. Значит целая сторона AC в два раза больше половинки: ' + p.ad + ' × 2 = ' + p.ac + '. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
            },
            ans: function(p){ return p.ac; },
            svg: function(p){ return MEDIAN_SVG; }
          }
        ]
      },
      2: { name: 'Равнобедренные', tasks: [] },
      3: { name: 'Прямоугольные', tasks: [] }
    }
  },
  16: { title: 'Параллелограмм', tasks: [] },
  17: { title: 'Окружность', tasks: [] },
  18: { title: 'Подобие', tasks: [] },
  19: { title: 'Координаты', tasks: [] },
  23: { title: 'Вектор', tasks: [] },
  24: { title: 'Равнобедренный', tasks: [] },
  25: { title: 'Кольцо', tasks: [] }
};

var SUCCESS_MSGS = ["МОЛОДЕЦ! 🎉", "МОЛОДЦОМ!!!", "В ОТЛИЧНОМ СТИЛЕ! 👍", "МОЛОДЦОМ!!!", "Молодцом!!!"];
var FAIL_MSGS = ["ОЙ-ЁЙ... 🤦️", "НЕ ТО! ", "ПОДУМАЙ ЕЩЁ! 🤨", "МИМО! ❌", "НУ КАК ТАК? 😤"];

function initTaskQueue(num, subIdx) {
  var key = num + '_' + subIdx;
  var len = TASKS_DB[num].subTopics[subIdx].tasks.length;
  var queue = [];
  for(var i=0; i<len; i++) queue.push(i);
  for(var i = queue.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = queue[i]; queue[i] = queue[j]; queue[j] = temp;
  }
  appState.taskQueue[key] = queue;
}
function getNextTaskIndex(num, subIdx) {
  var key = num + '_' + subIdx;
  if(!appState.taskQueue[key] || appState.taskQueue[key].length === 0) initTaskQueue(num, subIdx);
  return appState.taskQueue[key].shift();
}

function switchTab(modeName) {
  appState.mode = modeName;
  document.getElementById('tab-train').className = modeName === 'train' ? 'tab active' : 'tab';
  document.getElementById('tab-exam').className = modeName === 'exam' ? 'tab exam-tab active' : 'tab exam-tab';
  var dash = document.getElementById('exam-info');
  dash.className = modeName === 'exam' ? 'exam-dash show' : 'exam-dash';
  if(modeName === 'exam') resetExam();
  closeTask();
}
function selectNum(n) {
  appState.num = n;
  document.querySelectorAll('.num-btn').forEach(function(b){ b.classList.toggle('selected', parseInt(b.dataset.num) === n); });
  var subMenu15 = document.getElementById('sub-menu-15');
  if(n === 15) subMenu15.classList.add('active'); else subMenu15.classList.remove('active');
}
function switchSub(idx) {
  appState.subIndex = idx;
  document.querySelectorAll('#sub-menu-15 .sub-btn').forEach(function(b, i){ b.classList.toggle('active', i === idx); });
  if(appState.num === 15) generateTask();
}
function generateTask() {
  var n = appState.num;
  if(!n) { alert('Выбери номер задания!'); return; }
  var taskData = TASKS_DB[n];
  if(!taskData) { alert('Эта задача пока в разработке! 🚧'); return; }
  var topic = taskData.subTopics ? taskData.subTopics[appState.subIndex] : null;
  if(!topic || !topic.tasks || topic.tasks.length === 0) { alert('Подпункт "' + (topic ? topic.name : '??') + '" пока в разработке! 🚧'); return; }
  var taskIdx = getNextTaskIndex(n, appState.subIndex);
  var variant = topic.tasks[taskIdx];
  var params = variant.gen();
  var svgHtml = variant.svg(params);
  var qTxt = variant.txt(params);
  var solR = variant.solRight(params);
  var solW = variant.solWrong(params);
  var corrAns = variant.ans(params);
  appState.currentSvg = svgHtml;
  document.getElementById('drawing-area').innerHTML = svgHtml;
  appState.params = { ans: corrAns, solRight: solR, solWrong: solW, num: n };
  document.getElementById('menu-screen').classList.remove('active');
  document.getElementById('task-screen').classList.add('active');
  document.getElementById('lbl-type').textContent = taskData.title;
  document.getElementById('lbl-num').textContent = 'Задание №' + n;
  document.getElementById('q-text').textContent = qTxt;
  document.getElementById('btn-check').style.display = 'flex';
  document.getElementById('btn-continue').style.display = 'none';
  resetUI();
}
function checkAnswer() {
  var raw = document.getElementById('inp-ans').value.replace(',', '.').trim();
  if(!raw) { alert('Введи ответ!'); return; }
  var val = parseFloat(raw);
  if(isNaN(val)) { alert('Введи корректное число!'); return; }
  if(!appState.params) { alert('Ошибка: нет активной задачи'); return; }
  var target = appState.params;
  var diff = Math.abs(val - target.ans);
  var solBox = document.getElementById('sol-txt');
  var drawingArea = document.getElementById('drawing-area');
  if(diff < 0.2) {
    showFB('Верно! ✅', true);
    solBox.className = 'solution correct-style';
    solBox.innerHTML = target.solRight;
    solBox.style.display = 'block'; 
    var msg = SUCCESS_MSGS[Math.floor(Math.random() * SUCCESS_MSGS.length)];
    drawingArea.innerHTML = '<div class="reaction-box"><div class="reaction-emoji">👍😎</div><div class="reaction-text ok">' + msg + '</div></div>';
    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-continue').style.display = 'flex';
    handleExamWin();
  } else {
    showFB('Неверно ❌ Посмотри разбор ниже.', false);
    solBox.className = 'solution';
    solBox.innerHTML = target.solWrong;
    solBox.style.display = 'block'; 
    var failMsg = FAIL_MSGS[Math.floor(Math.random() * FAIL_MSGS.length)];
    drawingArea.innerHTML = '<div class="reaction-box"><div class="reaction-emoji">🤦️😤</div><div class="reaction-text fail">' + failMsg + '</div></div>';
  }
  document.getElementById('inp-ans').disabled = true;
  document.getElementById('btn-check').disabled = true;
}
function showFB(msg, ok) { var el = document.getElementById('msg-fb'); el.innerText = msg; el.className = 'feedback ' + (ok ? 'fb-ok' : 'fb-no'); el.style.display = 'block'; }
function handleExamWin() {
  if(appState.mode !== 'exam') return;
  if(!appState.solved.includes(appState.params.num)) {
    appState.solved.push(appState.params.num);
    updateExamUI();
    if(appState.solved.length >= 2) { document.getElementById('btn-finish').style.display = 'block'; document.getElementById('win-msg').style.display = 'block'; showFB('🎉 Поздравляем! Экзамен сдан! 🎉', true); }
  }
}
function updateExamUI() {
  document.getElementById('score-val').innerText = appState.solved.length + ' / 2';
  document.querySelectorAll('.num-btn').forEach(function(b){ var num = parseInt(b.dataset.num); if(appState.solved.includes(num)) b.classList.add('solved'); else b.classList.remove('solved'); });
}
function resetExam() { appState.solved = []; updateExamUI(); document.getElementById('btn-finish').style.display = 'none'; document.getElementById('win-msg').style.display = 'none'; }
function finishExam() { alert('Отлично! Ты справился с экзаменом! 🎉'); resetExam(); closeTask(); switchTab('train'); }
function resetUI() { document.getElementById('inp-ans').value = ''; document.getElementById('inp-ans').disabled = false; document.getElementById('btn-check').disabled = false; document.getElementById('msg-fb').style.display = 'none'; document.getElementById('sol-txt').style.display = 'none'; }
function closeTask() { document.getElementById('task-screen').classList.remove('active'); document.getElementById('menu-screen').classList.add('active'); appState.num = null; appState.params = null; appState.currentSvg = null; document.querySelectorAll('.num-btn').forEach(function(b){ b.classList.remove('selected'); }); document.getElementById('sub-menu-15').classList.remove('active'); }

document.getElementById('tab-train').onclick = function(){ switchTab('train'); };
document.getElementById('tab-exam').onclick = function(){ switchTab('exam'); };
document.getElementById('btn-generate').onclick = generateTask;
document.getElementById('btn-check').onclick = checkAnswer;
document.getElementById('btn-back').onclick = closeTask;
document.getElementById('btn-finish').onclick = finishExam;
document.getElementById('btn-continue').onclick = function(){ generateTask(); };
document.querySelectorAll('.num-btn').forEach(function(btn){ btn.onclick = function(){ selectNum(parseInt(btn.dataset.num)); }; });
document.querySelectorAll('#sub-menu-15 .sub-btn').forEach(function(btn, idx){ btn.onclick = function(){ switchSub(idx); }; });
selectNum(15);
</script>
