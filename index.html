<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Генератор ОГЭ Геометрия</title>
<style>
  :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
  * { -webkit-tap-highlight-color: transparent; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    background: var(--bg); 
    margin: 0; 
    padding: 0; 
    display: flex; 
    justify-content: center; 
    min-height: 100vh; 
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }
  
  .app { 
    width: 100%; 
    max-width: 500px; 
    background: white; 
    height: 100vh; 
    height: -webkit-fill-available;
    display: flex; 
    flex-direction: column; 
    box-shadow: 0 0 20px rgba(0,0,0,0.1); 
    overflow: hidden; 
  }
  
  header { 
    background: var(--primary); 
    color: white; 
    padding: 12px 15px; 
    text-align: center; 
    flex-shrink: 0;
  }
  h1 { margin: 0; font-size: 18px; font-weight: bold; }
  
  .tabs { display: flex; border-bottom: 2px solid #e2e8f0; flex-shrink: 0; }
  .tab { 
    flex: 1; 
    padding: 15px 10px; 
    border: none; 
    cursor: pointer; 
    font-weight: bold; 
    font-size: 14px;
    color: #94a3b8; 
    transition: 0.2s; 
    background: white; 
    -webkit-appearance: none;
  }
  .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #eff6ff; }
  .tab.exam-tab.active { color: #ea580c; border-color: #ea580c; background: #fff7ed; }

  .screen { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px; -webkit-overflow-scrolling: touch; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  
  .exam-dash { 
    display: none; 
    background: #fffbeb; 
    border: 1px solid #fcd34d; 
    padding: 12px; 
    border-radius: 10px; 
    width: 100%; 
    text-align: center; 
    margin-bottom: 15px; 
    font-size: 14px;
    box-sizing: border-box;
  }
  .exam-dash.show { display: block; }
  .score-text { font-size: 18px; font-weight: bold; color: #ea580c; }
  .win-msg { color: var(--success); font-weight: bold; display: none; margin-top: 5px; animation: popIn 0.3s; }

  .grid-numbers { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 8px; 
    width: 100%; 
    margin-bottom: 15px; 
  }
  .num-btn { 
    aspect-ratio: 1; 
    border: 2px solid #cbd5e1; 
    border-radius: 12px; 
    background: white; 
    font-size: 16px; 
    font-weight: bold; 
    color: #334155; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: 0.2s; 
    position: relative; 
    user-select: none;
    min-height: 60px;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .num-btn:hover { background: #eff6ff; border-color: var(--primary); }
  .num-btn:active { transform: scale(0.95); }
  .num-btn.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }
  .num-btn.solved { background: #dcfce7; border-color: var(--success); color: #166534; }
  .num-btn.solved::after { content: '✓'; position: absolute; top: 2px; right: 4px; font-size: 14px; font-weight: 900; }

  .sub-nav { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; margin-bottom: 12px; }
  .sub-nav.active { display: grid; }
  .sub-btn { 
    padding: 12px 8px; 
    border: 1px solid #cbd5e1; 
    border-radius: 8px; 
    background: #f8fafc; 
    font-size: 13px; 
    font-weight: 600; 
    color: #475569; 
    cursor: pointer; 
    transition: 0.2s; 
    text-align: center; 
    user-select: none;
    -webkit-appearance: none;
    touch-action: manipulation;
    min-height: 44px;
  }
  .sub-btn:hover { background: #eff6ff; border-color: var(--primary); }
  .sub-btn:active { transform: scale(0.95); }
  .sub-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  .task-card { width: 100%; animation: slideUp 0.3s; }
  .meta { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 8px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }
  
  .canvas-box { 
    width: 100%; 
    height: 200px; 
    background: #ffffff; 
    border: 2px solid #cbd5e1; 
    border-radius: 12px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin-bottom: 15px; 
    position: relative; 
    overflow: hidden;
    flex-shrink: 0;
  }
  svg { width: 100%; height: 100%; max-width: 280px; max-height: 180px; }

  .reaction-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; height: 100%; text-align: center;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    padding: 10px;
  }
  .reaction-emoji { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }
  .reaction-text { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .reaction-text.ok { color: var(--success); }
  .reaction-text.fail { color: var(--danger); }

  .question { 
    font-size: 16px; 
    line-height: 1.5; 
    text-align: left; 
    margin-bottom: 15px; 
    font-weight: 500; 
    color: #1e293b; 
    padding: 0 5px; 
  }
  
  input[type="number"] { 
    width: 100%; 
    padding: 15px; 
    border: 2px solid #cbd5e1; 
    border-radius: 10px; 
    font-size: 16px;
    text-align: center; 
    margin-bottom: 14px; 
    outline: none; 
    box-sizing: border-box;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--primary); }

  .actions { display: flex; gap: 8px; width: 100%; }
  .btn-action { 
    flex: 1; 
    padding: 15px 12px; 
    border: none; 
    border-radius: 10px; 
    font-weight: bold; 
    cursor: pointer; 
    font-size: 15px; 
    color: white; 
    transition: 0.2s; 
    user-select: none; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    min-height: 48px;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .btn-action:active { transform: scale(0.95); opacity: 0.9; }
  .btn-primary { background: var(--primary); }
  .btn-success { background: var(--success); }
  .btn-back { background: #cbd5e1; color: #334155; }
  .btn-finish { background: #ea580c; width: 100%; display: none; margin-top: 10px; min-height: 48px; }
  .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .feedback { padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; display: none; margin-bottom: 10px; font-size: 15px; }
  .fb-ok { background: #dcfce7; color: #166534; display: block; }
  .fb-no { background: #fee2e2; color: #991b1b; display: block; }

  .solution { 
    background: #f1f5f9; 
    padding: 15px; 
    border-left: 4px solid var(--primary); 
    color: #334155; 
    font-size: 14px; 
    display: none; 
    white-space: pre-wrap; 
    line-height: 1.5; 
    border-radius: 0 8px 8px 0; 
    margin-bottom: 10px;
    word-wrap: break-word;
  }
  .solution.correct-style { border-color: var(--success); color: var(--success); font-weight: bold; font-size: 16px; text-align: center; }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  @media (max-height: 650px) {
    .canvas-box { height: 160px; }
    .reaction-emoji { font-size: 40px; }
    .reaction-text { font-size: 16px; }
    header { padding: 10px 15px; }
    h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <header><h1>ГЕОМЕТРИЯ ОГЭ</h1></header>

  <div class="tabs">
    <button class="tab active" id="tab-train">Тренировка</button>
    <button class="tab exam-tab" id="tab-exam">ЭКЗАМЕН</button>
  </div>

  <div id="menu-screen" class="screen active">
    <div id="exam-info" class="exam-dash">
      Для сдачи нужно решить любые <strong>2 задачи</strong>.<br>
      Готово: <span class="score-text" id="score-val">0 / 2</span>
      <div id="win-msg" class="win-msg">🎉 ЭКЗАМЕН СДАН! 🎉</div>
    </div>

    <div style="font-size:14px; color:#64748b; margin-bottom:8px;">Выбери номер задания:</div>
    <div class="grid-numbers">
      <div class="num-btn" data-num="15">15</div>
      <div class="num-btn" data-num="16">16</div>
      <div class="num-btn" data-num="17">17</div>
      <div class="num-btn" data-num="18">18</div>
      <div class="num-btn" data-num="19">19</div>
      <div class="num-btn" data-num="23">23</div>
      <div class="num-btn" data-num="24">24</div>
      <div class="num-btn" data-num="25">25</div>
    </div>

    <button class="btn-action btn-primary" id="btn-generate">🚀 Генерировать задачу</button>
  </div>

  <div id="task-screen" class="screen">
    <div class="task-card">
      <div class="meta"><span id="lbl-type">Тип</span><span id="lbl-num">№?</span></div>
      
      <div id="sub-menu-15" class="sub-nav">
        <button class="sub-btn" data-sub="0">Углы</button>
        <button class="sub-btn" data-sub="1">Общие треугольники</button>
        <button class="sub-btn" data-sub="2">Равнобедренные</button>
        <button class="sub-btn" data-sub="3">Прямоугольные</button>
      </div>
      
      <div class="canvas-box" id="drawing-area"></div>

      <div id="q-text" class="question">...</div>

      <input type="number" id="inp-ans" placeholder="Введите ответ" step="any">

      <div id="msg-fb" class="feedback"></div>
      <div id="sol-txt" class="solution"></div>

      <div class="actions">
        <button class="btn-action btn-back" id="btn-back">❌ Меню</button>
        <button class="btn-action btn-success" id="btn-check">Проверить</button>
        <button class="btn-action btn-primary" id="btn-continue" style="display: none;">➡ Продолжить</button>
      </div>
      
      <button class="btn-action btn-finish" id="btn-finish">🏁 Завершить экзамен</button>
    </div>
  </div>
</div>

<script>
var appState = {
  mode: 'train',
  num: null,
  params: null,
  solved: [],
  subIndex: 0,
  currentSvg: null 
};

var TASKS_DB = {
  15: {
    title: 'Треугольники и их элементы',
    variants: [
      // 👇 ЗАДАЧА 1: БИССЕКТРИСА (индекс 0)
      { 
        name: 'Углы', 
        gen: function(){ return {angle: (Math.floor(Math.random() * 30) + 10) * 2}; },
        txt: function(p){ return 'В △ABC известно, что ∠ACB = ' + p.angle + '°. CD — биссектриса. Найдите угол ACD.'; }, 
        
        solRight: function(p){ 
          return 'МОЛОДЕЦ! ✅ Правильно, ' + (p.angle/2) + '°.'; 
        },
        solWrong: function(p){ 
          return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Биссектриса, как ты понимаешь, режет угол ровно напополам — это база. Так что без танцев с бубном берём ' + p.angle + '° и просто делим на 2. Считаем: ' + p.angle + '° / 2 = ' + (p.angle/2) + '°. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
        },
        
        ans: function(p){ return p.angle / 2; },
        svg: function(p){ 
          return '<svg viewBox="0 0 300 220" width="280" height="190">' +
             '<polygon points="30,190 90,110 270,190" fill="#b3e0ff" stroke="none"/>' +
             '<polygon points="150,30 90,110 270,190" fill="#ffb3c1" stroke="none"/>' +
             '<line x1="30" y1="190" x2="150" y2="30" stroke="#bf360c" stroke-width="2"/>' +
             '<line x1="150" y1="30" x2="270" y2="190" stroke="#bf360c" stroke-width="2"/>' +
             '<line x1="270" y1="190" x2="30" y2="190" stroke="#bf360c" stroke-width="2"/>' +
             '<line x1="270" y1="190" x2="90" y2="110" stroke="#bf360c" stroke-width="2"/>' +
             '<path d="M 235,190 A 35,35 0 0,1 237,177" fill="none" stroke="#000" stroke-width="1.5"/>' +
             '<path d="M 237,177 A 35,35 0 0,1 249,162" fill="none" stroke="#000" stroke-width="1.5"/>' +
             '<text x="20" y="205" font-size="18" fill="#000000" font-weight="bold">A</text>' +
             '<text x="145" y="25" font-size="18" fill="#000000" font-weight="bold">B</text>' +
             '<text x="275" y="205" font-size="18" fill="#000000" font-weight="bold">C</text>' +
             '<text x="75" y="105" font-size="14" fill="#000000" font-weight="bold">D</text>' +
             '</svg>'; 
        }
      },
      // 👇 ЗАДАЧА 2: СУММА УГЛОВ (индекс 1)
      { 
        name: 'Углы', 
        gen: function(){ return {angleB: 62, angleC: 40}; },
        txt: function(p){ return 'В треугольнике угол C = ' + p.angleC + '° и угол B = ' + p.angleB + '°. Найдите его третий угол. Ответ дайте в градусах.'; }, 
        
        solRight: function(p){ 
          var angleA = 180 - p.angleB - p.angleC;
          return 'МОЛОДЕЦ! ✅ Правильно, ' + angleA + '°.'; 
        },
        solWrong: function(p){ 
          var angleA = 180 - p.angleB - p.angleC;
          return 'Ну Ты Чё!?!? Смотри, тут всё прозрачно. Сумма углов в треугольнике — это 180°, это база. Так что без танцев с бубном отнимаем известные: 180° - ' + p.angleB + '° - ' + p.angleC + '° = ' + angleA + '°. Вот и весь расклад.\n\nПопробуй ещё! У тебя всё получится! 💪'; 
        },
        
        ans: function(p){ return 180 - p.angleB - p.angleC; },
        svg: function(p){ 
          return '<svg viewBox="0 0 300 220" width="280" height="190">' +
             '<polygon points="150,30 30,190 270,190" fill="#ffb3c1" stroke="none"/>' +
             '<line x1="150" y1="30" x2="30" y2="190" stroke="#bf360c" stroke-width="2"/>' +
             '<line x1="30" y1="190" x2="270" y2="190" stroke="#bf360c" stroke-width="2"/>' +
             '<line x1="270" y1="190" x2="150" y2="30" stroke="#bf360c" stroke-width="2"/>' +
             '<text x="20" y="205" font-size="18" fill="#000000" font-weight="bold">A</text>' +
             '<text x="145" y="25" font-size="18" fill="#000000" font-weight="bold">B</text>' +
             '<text x="275" y="205" font-size="18" fill="#000000" font-weight="bold">C</text>' +
             '</svg>'; 
        }
      },
      { name: 'Общие треугольники' }, 
      { name: 'Равнобедренные' },     
      { name: 'Прямоугольные' }       
    ]
  },
  16: { title: 'Параллелограмм', variants: [] },
  17: { title: 'Окружность', variants: [] },
  18: { title: 'Подобие', variants: [] },
  19: { title: 'Координаты', variants: [] },
  23: { title: 'Вектор', variants: [] },
  24: { title: 'Равнобедренный', variants: [] },
  25: { title: 'Кольцо', variants: [] }
};

var SUCCESS_MSGS = ["МОЛОДЕЦ! 🎉", "МОЛОДЦОМ!!!", "В ОТЛИЧНОМ СТИЛЕ! 👍", "МОЛОДЦОМ!!!", "Молодцом!!!"];
var FAIL_MSGS = ["ОЙ-ЁЙ... 🤦♂️", "НЕ ТО! 📉", "ПОДУМАЙ ЕЩЁ! 🤨", "МИМО! ❌", "НУ КАК ТАК? 😤"];

function switchTab(modeName) {
  appState.mode = modeName;
  document.getElementById('tab-train').className = modeName === 'train' ? 'tab active' : 'tab';
  document.getElementById('tab-exam').className = modeName === 'exam' ? 'tab exam-tab active' : 'tab exam-tab';
  var dash = document.getElementById('exam-info');
  dash.className = modeName === 'exam' ? 'exam-dash show' : 'exam-dash';
  if(modeName === 'exam') resetExam();
  closeTask();
}

function selectNum(n) {
  appState.num = n;
  document.querySelectorAll('.num-btn').forEach(function(b){
    b.classList.toggle('selected', parseInt(b.dataset.num) === n);
  });
  var subMenu15 = document.getElementById('sub-menu-15');
  if(n === 15) subMenu15.classList.add('active'); else subMenu15.classList.remove('active');
}

function switchSub(idx) {
  appState.subIndex = idx;
  document.querySelectorAll('#sub-menu-15 .sub-btn').forEach(function(b, i){
    b.classList.toggle('active', i === idx);
  });
  if(appState.num === 15) generateTask();
}

function generateTask() {
  var n = appState.num;
  if(!n) { alert('Выбери номер задания!'); return; }
  
  var taskData = TASKS_DB[n];
  if(!taskData || !taskData.variants || taskData.variants.length === 0) {
    alert('Эта задача пока в разработке! 🚧'); return;
  }

  var variant;
  
  // 👇 ГЛАВНОЕ ИСПРАВЛЕНИЕ: если выбрали №15 и подпункт 0 или 1 (Углы или Общие) - случайно выбираем одну из двух задач про углы
  if(n === 15 && (appState.subIndex === 0 || appState.subIndex === 1)) {
    var randomIdx = Math.floor(Math.random() * 2); // 0 или 1
    variant = taskData.variants[randomIdx];
  } else {
    variant = taskData.variants[appState.subIndex];
  }
  
  if(!variant || !variant.svg) {
    alert('Подпункт "' + (variant ? variant.name : '??') + '" пока в разработке! 🚧'); return;
  }

  var params = variant.gen();
  var svgHtml = variant.svg(params);
  var qTxt = variant.txt(params);
  
  var solR = variant.solRight ? variant.solRight(params) : 'Верно!';
  var solW = variant.solWrong ? variant.solWrong(params) : 'Подумай ещё раз.';
  var corrAns = variant.ans(params);
  
  appState.currentSvg = svgHtml;
  document.getElementById('drawing-area').innerHTML = svgHtml;
  
  appState.params = { ans: corrAns, solRight: solR, solWrong: solW, num: n };
  
  document.getElementById('menu-screen').classList.remove('active');
  document.getElementById('task-screen').classList.add('active');
  
  document.getElementById('lbl-type').textContent = taskData.title;
  document.getElementById('lbl-num').textContent = 'Задание №' + n;
  document.getElementById('q-text').textContent = qTxt;
  
  document.getElementById('btn-check').style.display = 'flex';
  document.getElementById('btn-continue').style.display = 'none';
  
  resetUI();
}

function checkAnswer() {
  var raw = document.getElementById('inp-ans').value.replace(',', '.').trim();
  if(!raw) { alert('Введи ответ!'); return; }
  var val = parseFloat(raw);
  if(isNaN(val)) { alert('Введи корректное число!'); return; }
  
  if(!appState.params) { alert('Ошибка: нет активной задачи'); return; }
  
  var target = appState.params;
  var diff = Math.abs(val - target.ans);
  var solBox = document.getElementById('sol-txt');
  var drawingArea = document.getElementById('drawing-area');
  
  if(diff < 0.2) {
    showFB('Верно! ✅', true);
    solBox.className = 'solution correct-style';
    solBox.innerHTML = target.solRight;
    solBox.style.display = 'block'; 
    
    var msg = SUCCESS_MSGS[Math.floor(Math.random() * SUCCESS_MSGS.length)];
    drawingArea.innerHTML = 
      '<div class="reaction-box">' +
        '<div class="reaction-emoji">👍😎</div>' +
        '<div class="reaction-text ok">' + msg + '</div>' +
      '</div>';
    
    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-continue').style.display = 'flex';
    
    handleExamWin();
  } else {
    showFB('Неверно ❌ Посмотри разбор ниже.', false);
    solBox.className = 'solution';
    solBox.innerHTML = target.solWrong;
    solBox.style.display = 'block'; 
    
    var failMsg = FAIL_MSGS[Math.floor(Math.random() * FAIL_MSGS.length)];
    drawingArea.innerHTML = 
      '<div class="reaction-box">' +
        '<div class="reaction-emoji">🤦‍️😤</div>' +
        '<div class="reaction-text fail">' + failMsg + '</div>' +
      '</div>';
  }
  document.getElementById('inp-ans').disabled = true;
  document.getElementById('btn-check').disabled = true;
}

function showFB(msg, ok) {
  var el = document.getElementById('msg-fb');
  el.innerText = msg;
  el.className = 'feedback ' + (ok ? 'fb-ok' : 'fb-no');
  el.style.display = 'block';
}

function handleExamWin() {
  if(appState.mode !== 'exam') return;
  if(!appState.solved.includes(appState.params.num)) {
    appState.solved.push(appState.params.num);
    updateExamUI();
    if(appState.solved.length >= 2) {
      document.getElementById('btn-finish').style.display = 'block';
      document.getElementById('win-msg').style.display = 'block';
      showFB('🎉 Поздравляем! Экзамен сдан! 🎉', true);
    }
  }
}

function updateExamUI() {
  document.getElementById('score-val').innerText = appState.solved.length + ' / 2';
  document.querySelectorAll('.num-btn').forEach(function(b){
    var num = parseInt(b.dataset.num);
    if(appState.solved.includes(num)) b.classList.add('solved'); else b.classList.remove('solved');
  });
}

function resetExam() {
  appState.solved = []; updateExamUI();
  document.getElementById('btn-finish').style.display = 'none';
  document.getElementById('win-msg').style.display = 'none';
}

function finishExam() {
  alert('Отлично! Ты справился с экзаменом! 🎉');
  resetExam(); closeTask(); switchTab('train');
}

function resetUI() {
  document.getElementById('inp-ans').value = '';
  document.getElementById('inp-ans').disabled = false;
  document.getElementById('btn-check').disabled = false;
  document.getElementById('msg-fb').style.display = 'none';
  document.getElementById('sol-txt').style.display = 'none';
}

function closeTask() {
  document.getElementById('task-screen').classList.remove('active');
  document.getElementById('menu-screen').classList.add('active');
  appState.num = null; appState.params = null; appState.currentSvg = null;
  document.querySelectorAll('.num-btn').forEach(function(b){ b.classList.remove('selected'); });
  document.getElementById('sub-menu-15').classList.remove('active');
}

document.getElementById('tab-train').onclick = function(){ switchTab('train'); };
document.getElementById('tab-exam').onclick = function(){ switchTab('exam'); };
document.getElementById('btn-generate').onclick = generateTask;
document.getElementById('btn-check').onclick = checkAnswer;
document.getElementById('btn-back').onclick = closeTask;
document.getElementById('btn-finish').onclick = finishExam;

document.getElementById('btn-continue').onclick = function(){ 
    generateTask(); 
};

document.querySelectorAll('.num-btn').forEach(function(btn){
  btn.onclick = function(){ selectNum(parseInt(btn.dataset.num)); };
});

document.querySelectorAll('#sub-menu-15 .sub-btn').forEach(function(btn, idx){
  btn.onclick = function(){ switchSub(idx); };
});

selectNum(15);
</script>
</body>
</html>
