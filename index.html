<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Геометрия ОГЭ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f8fafc;color:#1e293b;padding:12px;line-height:1.4}
.wrap{max-width:600px;margin:0 auto}
h1{text-align:center;margin:10px 0;font-size:1.4rem}
.box{background:#fff;padding:14px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.b{padding:8px 12px;border:2px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;min-height:44px}
.b:hover,.b.on{background:#2563eb;color:#fff;border-color:#2563eb}
.b.hard{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.b.hard.on{background:#f59e0b;color:#fff}
.info{text-align:center;font-size:13px;color:#475569;background:#f0f9ff;padding:8px;border-radius:8px;margin-bottom:8px}
#err{display:none;background:#fee2e2;color:#dc2626;padding:10px;border-radius:8px;margin-bottom:10px;border-left:4px solid #dc2626}
#task{display:none}#task.show{display:block}
#svg{min-height:250px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-bottom:10px}
#q{font-size:15px;text-align:center;margin-bottom:12px;line-height:1.5}
.row{display:flex;gap:6px;margin-bottom:8px}
.row input{flex:1;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px}
.row input:focus{outline:none;border-color:#2563eb}
.sym{padding:0 14px;background:#e2e8f0;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-weight:700;font-size:16px;min-width:44px}
.sym:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.hint{font-size:12px;color:#64748b;text-align:center;margin-bottom:10px;background:#f0f9ff;padding:6px;border-radius:6px}
.act{display:block;width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:15px;margin-bottom:6px;min-height:48px}
.act:disabled{opacity:.5;cursor:not-allowed}
.ok{background:#2563eb;color:#fff}.sec{background:#e2e8f0;color:#334155}.hint-btn{background:#f0f9ff;color:#0369a1;border:2px solid #0369a1;margin-bottom:8px}
.main{background:#f59e0b;color:#fff;font-size:16px;margin-bottom:12px}
.fb{padding:10px;border-radius:8px;margin-top:8px;font-size:14px;display:none}
.fb.y{display:block;background:#dcfce7;color:#166534;border-left:4px solid #16a34a}
.fb.n{display:block;background:#fee2e2;color:#dc2626;border-left:4px solid #dc2626}
.fb.p{display:block;background:#e0f2fe;color:#0369a1;border-left:4px solid #0284c7}
.sol{margin-top:10px;padding:12px;background:#f8fafc;border-radius:8px;font-size:14px;white-space:pre-line;border-left:4px solid #2563eb;display:none}
.sol.show{display:block}
.hint-card{background:#f0f9ff;border:2px solid #0369a1;border-radius:10px;padding:12px;margin:8px 0;font-size:14px;display:none}
.hint-card.show{display:block}
.hint-title{font-weight:700;color:#0369a1;margin-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📐 Геометрия ОГЭ</h1>
  <div id="err"></div>
  <div class="box">
    <div class="btns">
      <button class="b on" onclick="sel('15')">№15</button>
      <button class="b" onclick="sel('16')">№16</button>
      <button class="b" onclick="sel('17')">№17</button>
      <button class="b" onclick="sel('18')">№18</button>
      <button class="b" onclick="sel('19')">№19</button>
      <button class="b hard" onclick="sel('23')">№23</button>
      <button class="b hard" onclick="sel('24')">№24</button>
      <button class="b hard" onclick="sel('25')">№25</button>
    </div>
    <div id="inf" class="info"><b>Задание 15</b><br>Треугольники, биссектрисы</div>
  </div>
  <div id="task" class="show">
    <div class="box">
      <button id="hintBtn" class="act hint-btn" onclick="toggleHint()" disabled>💡 Подсказка</button>
      <div id="hintCard" class="hint-card"><div class="hint-title">📘 Теорема</div><div id="hintText"></div></div>
      <div id="svg"></div>
      <div id="q">Нажми «🎲 Новая задача»</div>
      <div class="row">
        <input type="text" id="ans" placeholder="Ответ" disabled>
        <button class="sym" onclick="ins('√')">√</button>
        <button class="sym" onclick="ins('/')">/</button>
      </div>
      <div class="hint">Примеры: 12 | 12.5 | 12/5 | 4√3</div>
      <button id="chk" class="act ok" disabled>✅ Проверить</button>
      <button id="sol" class="act sec" disabled>📝 Решение</button>
      <div id="fb" class="fb"></div>
      <div id="sol-box" class="sol"></div>
    </div>
  </div>
  <button class="act main" onclick="gen()">🎲 Новая задача</button>
  <footer style="text-align:center;margin-top:16px;font-size:12px;color:#64748b">Задачи из Решу ОГЭ • v2.3</footer>
</div>

<script>
const TASKS = {
'15':[
  ()=>({txt:'В △ABC ∠A=32°, ∠B=56°. Найди ∠C.',ans:92,sol:'∠C=180°-32°-56°=92°\nОтвет: 92',d:'tri',p:{A:32,B:56},h:'Сумма углов △ = 180°'}),
  ()=>({txt:'В △ABC ∠A=45°, ∠B=67°. Найди внешний ∠ при C.',ans:112,sol:'Внешний ∠ = 45°+67°=112°\nОтвет: 112',d:'tri',p:{A:45,B:67},h:'Внешний ∠ = сумме двух внутренних'}),
  ()=>({txt:'В △ABC биссектриса AD, ∠BAC=84°. Найди ∠BAD.',ans:42,sol:'Биссектриса делит угол пополам: 84°/2=42°\nОтвет: 42',d:'bis',p:{a:84},h:'Биссектриса делит угол пополам'}),
  ()=>({txt:'Периметр равнобедр. △ = 32, основание = 14. Найди боковую.',ans:9,sol:'2a = 32-14 = 18 ⇒ a = 9\nОтвет: 9',d:'iso',p:{P:32,b:14},h:'P = 2a + b'}),
  ()=>({txt:'В равноб. трапеции ∠A=54°. Найди ∠B.',ans:126,sol:'∠A+∠B=180° ⇒ ∠B=180°-54°=126°\nОтвет: 126',d:'trap',p:{A:54},h:'Углы при боковой стороне трапеции в сумме дают 180°'}),
  ()=>({txt:'В △ABC AB=BC, ∠A=38°. Найди ∠B.',ans:104,sol:'∠C=∠A=38° ⇒ ∠B=180°-2·38°=104°\nОтвет: 104',d:'iso',p:{A:38},h:'В равнобедр. △ углы при основании равны'}),
  ()=>({txt:'S△=33, высота=6. Найди основание.',ans:11,sol:'a = 2S/h = 2·33/6 = 11\nОтвет: 11',d:'area',p:{S:33,h:6},h:'S = ½·a·h ⇒ a = 2S/h'})
],
'16':[
  ()=>({txt:'Дуга AB=124°. Угол между хордой и касательной в B?',ans:62,sol:'Угол = ½ дуги = 124°/2 = 62°\nОтвет: 62',d:'tangent',p:{arc:124},h:'Угол между касательной и хордой = ½ дуги'}),
  ()=>({txt:'Длина окружности = 50.24 (π≈3.14). Найди радиус.',ans:8,sol:'R = C/2π = 50.24/6.28 = 8\nОтвет: 8',d:'circ',p:{C:50.24},h:'C = 2πR ⇒ R = C/2π'}),
  ()=>({txt:'AC — диаметр, ∠BAC=36°. Найди ∠BCA.',ans:54,sol:'∠B=90° ⇒ ∠C=90°-36°=54°\nОтвет: 54',d:'diam',p:{A:36},h:'Вписанный угол на диаметре — прямой'}),
  ()=>({txt:'Вписанный угол опирается на дугу 118°. Чему равен угол?',ans:59,sol:'∠ = ½·118° = 59°\nОтвет: 59',d:'insc',p:{arc:118},h:'Вписанный ∠ = ½ дуги'}),
  ()=>({txt:'Центральный угол = 56°. Вписанный на ту же дугу?',ans:28,sol:'∠ = 56°/2 = 28°\nОтвет: 28',d:'centr',p:{a:56},h:'Вписанный = ½ центрального'}),
  ()=>({txt:'R=10, расстояние от центра до хорды = 6. Длина хорды?',ans:16,sol:'½ хорды = √(10²-6²)=8 ⇒ хорда=16\nОтвет: 16',d:'chord',p:{R:10,d:6},h:'Перпендикуляр из центра делит хорду пополам'})
],
'17':[
  ()=>({txt:'Диагонали ромба: 14 и 10. Найди площадь.',ans:70,sol:'S = ½·14·10 = 70\nОтвет: 70',d:'rhomb',p:{d1:14,d2:10},h:'S ромба = ½·d₁·d₂'}),
  ()=>({txt:'Сторона параллелограмма = 8, высота = 6. Площадь?',ans:48,sol:'S = 8·6 = 48\nОтвет: 48',d:'par',p:{a:8,h:6},h:'S = a·h'}),
  ()=>({txt:'a=6, b=8, угол между ними = 30°. S△?',ans:12,sol:'S = ½·6·8·sin30° = ½·48·0.5 = 12\nОтвет: 12',d:'tri2s',p:{a:6,b:8,C:30},h:'S = ½ab·sinγ'}),
  ()=>({txt:'Катеты прямот. △: 5 и 12. Площадь?',ans:30,sol:'S = ½·5·12 = 30\nОтвет: 30',d:'right',p:{a:5,b:12},h:'S = ½·катет·катет'}),
  ()=>({txt:'Катеты прямот. △: 6 и 8. Высота к гипотенузе?',ans:4.8,sol:'c=√(36+64)=10; h=6·8/10=4.8\nОтвет: 4.8',d:'righth',p:{a:6,b:8},h:'h = ab/c'})
],
'18':[
  ()=>({txt:'Прямоугольник 5×4 клеток. Площадь?',ans:20,sol:'S = 5·4 = 20\nОтвет: 20',d:'gridR',p:{w:5,h:4},h:'S = ширина × высота'}),
  ()=>({txt:'Прямоуг. △ на клетках, катеты 4 и 3. Площадь?',ans:6,sol:'S = ½·4·3 = 6\nОтвет: 6',d:'gridT',p:{a:4,b:3},h:'S = ½·a·b'}),
  ()=>({txt:'△ с вершинами (1,1), (5,1), (3,4). Площадь?',ans:6,sol:'По формуле: |1(1-4)+5(4-1)+3(1-1)|/2 = 6\nОтвет: 6',d:'gridC',p:{S:6},h:'Формула Гаусса для площади по координатам'})
],
'19':[
  ()=>({txt:'Верны ли утверждения? (номера подряд)\n1) В любой △ можно вписать окружность.\n2) Диагонали прямоугольника перпендикулярны.\n3) Противоположные стороны параллелограмма равны.',ans:'13',sol:'1) ✓ 2) ✗ 3) ✓\nОтвет: 13',d:'stmt',p:{},h:'Проверяй каждое утверждение отдельно'}),
  ()=>({txt:'Какое утверждение неверно?\n1) Сумма углов △ = 180°\n2) В любой параллелограмм можно вписать окружность.\n3) Площадь квадрата = a²',ans:'2',sol:'2) ✗\nОтвет: 2',d:'stmt',p:{},h:'В четырёхугольник вписать окружность ⇔ a+c=b+d'}),
  ()=>({txt:'Верно ли?\n1) Биссектриса равнобедр. △ — медиана.\n2) Диагонали трапеции равны.\n3) Центр описанной окружности △ — точка пересечения медиан.',ans:'1',sol:'1) ✓ 2) ✗ 3) ✗\nОтвет: 1',d:'stmt',p:{},h:'Запоминай: биссектрисы, медианы, высоты — разные линии'})
],
'23':[
  ()=>({txt:'В трапеции ∠ABC=∠ACD, BC=4, AD=16. Найди AC.',ans:8,sol:'△ABC~△DCA ⇒ AC²=4·16=64 ⇒ AC=8\nОтвет: 8',d:'trsim',p:{BC:4,AD:16},h:'Подобие: если углы равны, стороны пропорциональны'}),
  ()=>({txt:'Хорды пересекаются в K. AK=6, KB=4, CK=3. Найди KD.',ans:8,sol:'6·4 = 3·KD ⇒ KD = 24/3 = 8\nОтвет: 8',d:'chords',p:{AK:6,KB:4,CK:3},h:'AK·KB = CK·KD'}),
  ()=>({txt:'В прямот. △ высота CH. AH=4, CH=8. Найди BH.',ans:16,sol:'CH²=AH·BH ⇒ 64=4·BH ⇒ BH=16\nОтвет: 16',d:'altseg',p:{AH:4,CH:8},h:'Высота к гипотенузе: CH² = AH·BH'}),
  ()=>({txt:'Катеты прямот. △: 6 и 8. Высота к гипотенузе?',ans:4.8,sol:'c=10, h=6·8/10=4.8\nОтвет: 4.8',d:'righth',p:{a:6,b:8},h:'h = ab/c'})
],
'24':[
  ()=>({txt:'В △ABC высоты AD и BE. Докажи: △ABE ~ △ADC.',ans:'proof',sol:'1) ∠AEB=∠ADC=90°\n2) ∠A — общий\n3) △ABE ~ △ADC по двум углам ✓',d:'prf1',p:{},h:'Подобие по двум углам'}),
  ()=>({txt:'ABCD — параллелограмм, M — середина BC, AM∩BD=K. Докажи: BK:KD=1:2.',ans:'proof',sol:'1) △BKM ~ △DKA\n2) BK/KD = BM/AD = ½\n✓ BK:KD=1:2',d:'prf2',p:{},h:'Используй подобие и свойства параллелограмма'}),
  ()=>({txt:'В △ABC биссектриса BD. Докажи: AB/BC = AD/DC.',ans:'proof',sol:'1) Проведём CE∥BD\n2) ∠ABD=∠BEC, ∠DBC=∠BCE\n3) ∠ABD=∠DBC ⇒ BC=CE\n4) AB/BC = AD/DC ✓',d:'prf3',p:{},h:'Свойство биссектрисы'}),
  ()=>({txt:'ABCD — вписанный четырёхугольник. Докажи: ∠A+∠C=180°.',ans:'proof',sol:'1) ∠A=½дуги BCD, ∠C=½дуги BAD\n2) Дуга BCD+BAD=360°\n3) ∠A+∠C=180° ✓',d:'prf4',p:{},h:'Вписанный ∠ = ½ дуги'})
],
'25':[
  ()=>({txt:'В трапеции диагонали пересекаются в O. S△BOC=3, S△AOD=12. S трапеции?',ans:27,sol:'S=(√3+√12)²=(√3+2√3)²=(3√3)²=27\nОтвет: 27',d:'trapS',p:{S1:3,S2:12},h:'S=(√S₁+√S₂)²'}),
  ()=>({txt:'В прямот. трапеции AC⊥CD, AB=8, BC=15. Найди AD.',ans:31.9,sol:'AC=√(8²+15²)=17\n△ABC~△CAD ⇒ AD=AC·BC/AB=17·15/8≈31.9\nОтвет: 31.9',d:'rtrap',p:{AB:8,BC:15},h:'Ищи подобные прямоугольные треугольники'})
]
};

let state = {num:'15', task:null, solved:0, ok:0};
const INFO = {
  '15':['№15','Треугольники, биссектрисы'],'16':['№16','Окружность'],'17':['№17','Площади'],
  '18':['№18','Клетчатая бумага'],'19':['№19','Утверждения'],'23':['№23','Вычисления'],
  '24':['№24','Доказательства'],'25':['№25','Сложные']
};

function load(){try{const d=localStorage.getItem('oge');if(d)Object.assign(state,JSON.parse(d))}catch(e){}}
function save(){try{localStorage.setItem('oge',JSON.stringify({num:state.num,solved:state.solved,ok:state.ok}))}catch(e){}}
function updateInfo(){
  document.getElementById('inf').innerHTML = `<b>${INFO[state.num][0]}</b><br>${INFO[state.num][1]}`;
  document.querySelectorAll('.btns .b').forEach(b=>{
    b.classList.remove('on');
    if(b.textContent.includes(state.num)) b.classList.add('on');
  });
}
function sel(n){state.num=n;save();updateInfo();resetUI();}
function resetUI(){
  document.getElementById('q').textContent='Нажми «🎲 Новая задача»';
  document.getElementById('svg').innerHTML='';
  ['ans','chk','sol','hintBtn'].forEach(id=>document.getElementById(id).disabled=true);
  document.getElementById('fb').className='fb';
  document.getElementById('sol-box').classList.remove('show');
  document.getElementById('hintCard').classList.remove('show');
}
function ins(sym){const el=document.getElementById('ans');const s=el.selectionStart,e=el.selectionEnd,v=el.value;el.value=v.slice(0,s)+sym+v.slice(e);el.selectionStart=el.selectionEnd=s+sym.length;el.focus();}
function parseAns(str){if(!str)return NaN;str=str.trim().toLowerCase().replace(',','.').replace(/\s/g,'');if(str.includes('/')){const p=str.split('/');if(p.length===2){const a=parseFloat(p[0]),b=parseFloat(p[1]);if(!isNaN(a)&&!isNaN(b)&&b!==0)return a/b}}const m=str.match(/^(-?[\d.]+)√(\d+)$/);if(m)return (parseFloat(m[1])||1)*Math.sqrt(parseInt(m[2]));const n=parseFloat(str);return isNaN(n)?NaN:n;}
function check(){const val=document.getElementById('ans').value.trim();if(!val||!state.task)return;if(state.task.ans==='proof'){document.getElementById('fb').innerHTML='✅ <b>Доказательство!</b><br>Сверь ход с образцом.';document.getElementById('fb').className='fb p';document.getElementById('sol-box').textContent=state.task.sol;document.getElementById('sol-box').classList.add('show');return;}const u=parseAns(val),c=parseAns(String(state.task.ans));const fb=document.getElementById('fb');let ok=false;if(!isNaN(u)&&!isNaN(c)&&Math.abs(u-c)<0.02)ok=true;else if(val.toLowerCase()===String(state.task.ans).toLowerCase())ok=true;if(ok){fb.innerHTML='🎉 <b>Верно!</b><br>Ответ принят.';fb.className='fb y';state.ok++;}else{fb.innerHTML=`❌ <b>Неверно.</b><br>Правильно: <b>${state.task.ans}</b><br><br>${state.task.h||'💡 Повтори теорию.'}<br><br>📝 <i>Жми «Решение».</i>`;fb.className='fb n';}state.solved++;save();document.getElementById('hintBtn').disabled=true;document.getElementById('hintCard').classList.remove('show');}
function toggleHint(){const c=document.getElementById('hintCard');if(c.classList.contains('show')){c.classList.remove('show');document.getElementById('hintBtn').textContent='💡 Подсказка';}else if(state.task&&state.task.h){document.getElementById('hintText').textContent=state.task.h;c.classList.add('show');document.getElementById('hintBtn').textContent='🔽 Скрыть';}}
function showSol(){const b=document.getElementById('sol-box');if(b.classList.contains('show')){b.classList.remove('show');document.getElementById('sol').textContent='📝 Решение';}else{b.textContent=state.task.sol;b.classList.add('show');document.getElementById('sol').textContent='📝 Скрыть';}}
function gen(){const pool=TASKS[state.num];if(!pool||!pool.length)return;state.task=pool[Math.floor(Math.random()*pool.length)]();document.getElementById('q').textContent=state.task.txt;draw(state.task.d,state.task.p);document.getElementById('ans').value='';['ans','chk','sol','hintBtn'].forEach(id=>document.getElementById(id).disabled=false);document.getElementById('fb').className='fb';document.getElementById('sol-box').classList.remove('show');document.getElementById('hintCard').classList.remove('show');document.getElementById('sol').textContent='📝 Решение';document.getElementById('hintBtn').textContent='💡 Подсказка';}

// 🎨 ИСПРАВЛЕННАЯ ОТРИСОВКА (гарантированные координаты, без наложений)
function draw(type, p) {
  let s = '<svg viewBox="0 0 360 260" style="width:100%;max-width:320px;overflow:visible">';
  const c='#334155', b='#2563eb', r='#dc2626', w='#f59e0b';
  const L=(x,y,t)=>`<text x="${x}" y="${y}" text-anchor="middle" font-size="18" font-weight="bold" fill="${c}">${t}</text>`;
  const V=(x,y,t)=>`<text x="${x}" y="${y}" text-anchor="middle" font-size="16" font-weight="bold" fill="${b}">${t}</text>`;
  const A=(x,y)=>`<text x="${x}" y="${y}" text-anchor="middle" font-size="16" font-weight="bold" fill="${r}">∠=?</text>`;

  if(type==='tri'){
    s+=`<polygon points="180,65 50,205 310,205" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=L(180,45,'A')+L(25,220,'B')+L(335,220,'C');
    if(p.A)s+=V(105,95,p.A+'°');
    if(p.B)s+=V(65,180,p.B+'°');
    s+=A(265,180);
  }else if(type==='bis'){
    s+=`<polygon points="180,65 50,205 310,205" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="180" y1="65" x2="180" y2="205" stroke="${b}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    s+=L(180,45,'A')+L(25,220,'B')+L(335,220,'C')+L(180,230,'D');
    if(p.a)s+=V(105,95,p.a+'°');
    s+=`<text x="180" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="${r}">∠BAD=?</text>`;
  }else if(type==='iso'){
    s+=`<polygon points="70,205 290,205 180,55" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="120" y1="135" x2="125" y2="140" stroke="${c}" stroke-width="2"/><line x1="240" y1="135" x2="235" y2="140" stroke="${c}" stroke-width="2"/>`;
    s+=L(45,220,'A')+L(315,220,'B')+L(180,35,'C');
    if(p.b)s+=V(180,225,p.b);
    if(p.A)s+=V(90,120,p.A);
  }else if(type==='trap'){
    s+=`<polygon points="80,195 280,195 220,65 140,65" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=L(55,215,'A')+L(305,215,'D')+L(245,45,'C')+L(115,45,'B');
    if(p.A)s+=V(180,210,p.A+'°');
    s+=A(180,35);
  }else if(type==='tangent'){
    s+=`<circle cx="160" cy="130" r="60" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="220" y1="130" x2="285" y2="65" stroke="${b}" stroke-width="2"/>`;
    s+=`<line x1="220" y1="130" x2="100" y2="130" stroke="${c}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    s+=L(160,160,'O')+L(245,150,'B')+L(75,150,'A');
    s+=A(255,80);
  }else if(type==='diam'){
    s+=`<circle cx="160" cy="130" r="60" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="100" y1="130" x2="220" y2="130" stroke="${b}" stroke-width="2"/>`;
    s+=`<polygon points="100,130 220,130 160,70" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<rect x="156" y="126" width="8" height="8" stroke="${c}" stroke-width="1.5" fill="none"/>`;
    s+=L(75,150,'A')+L(245,150,'C')+L(160,45,'B');
    if(p.A)s+=V(95,85,p.A+'°');
  }else if(type==='rhomb'){
    s+=`<polygon points="180,65 250,130 180,195 110,130" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="110" y1="130" x2="250" y2="130" stroke="${c}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    s+=`<line x1="180" y1="65" x2="180" y2="195" stroke="${c}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    s+=L(180,40,'A')+L(275,140,'B')+L(180,220,'C')+L(85,140,'D');
  }else if(type==='chords'){
    s+=`<circle cx="180" cy="130" r="70" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<line x1="110" y1="130" x2="250" y2="130" stroke="${b}" stroke-width="2"/>`;
    s+=`<line x1="130" y1="65" x2="230" y2="195" stroke="${r}" stroke-width="1.5"/>`;
    s+=L(180,155,'K')+L(85,150,'A')+L(275,150,'B')+L(105,45,'C')+L(250,215,'D');
  }else if(type==='right'||type==='righth'){
    s+=`<polygon points="90,185 270,185 180,55" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<rect x="176" y="181" width="8" height="8" stroke="${c}" stroke-width="1.5" fill="none"/>`;
    s+=L(65,205,'A')+L(295,205,'B');
    if(type==='righth'){
      s+=`<line x1="180" y1="55" x2="180" y2="185" stroke="${b}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
      s+=`<rect x="176" y="51" width="8" height="8" stroke="${c}" stroke-width="1.5" fill="none"/>`;
      s+=L(180,35,'C')+L(205,210,'H');
      if(p.a)s+=V(135,205,p.a);
      if(p.b)s+=V(240,205,p.b);
    }else{
      s+=L(180,35,'C');
      if(p.a)s+=V(135,205,p.a);
      if(p.b)s+=V(240,205,p.b);
    }
  }else if(type==='gridR'){
    s+=`<rect x="80" y="75" width="200" height="110" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=L(60,60,'A')+L(300,60,'B')+L(300,205,'C')+L(60,205,'D');
  }else if(type==='gridT'||type==='gridC'){
    s+=`<polygon points="80,195 280,195 180,95" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=`<rect x="176" y="191" width="8" height="8" stroke="${c}" stroke-width="1.5" fill="none"/>`;
    s+=L(55,215,'A')+L(305,215,'B')+L(180,75,'C');
  }else if(type==='stmt'||type.startsWith('prf')){
    s+=`<text x="180" y="130" text-anchor="middle" font-size="22" fill="${c}">📋</text>`;
  }else if(type==='area'||type==='tri2s'){
    s+=`<polygon points="100,185 260,185 180,65" stroke="${c}" stroke-width="2" fill="none"/>`;
    if(type==='area'){s+=`<line x1="180" y1="65" x2="180" y2="185" stroke="${b}" stroke-width="1.5" stroke-dasharray="4,3"/>`;s+=L(180,45,'C');}
    s+=L(75,205,'A')+L(285,205,'B');
    if(p.h)s+=V(180,125,p.h);
    if(p.a)s+=V(135,205,p.a);
    if(p.b)s+=V(240,205,p.b);
    if(p.S)s+=V(180,140,p.S);
  }else if(type==='circ'||type==='insc'||type==='centr'){
    s+=`<circle cx="160" cy="130" r="60" stroke="${c}" stroke-width="2" fill="none"/>`;
    s+=L(160,160,'O');
    if(type==='centr'){s+=`<line x1="160" y1="130" x2="220" y2="70" stroke="${b}" stroke-width="2"/><line x1="160" y1="130" x2="100" y2="70" stroke="${b}" stroke-width="2"/>`;if(p.a)s+=V(160,50,p.a+'°');}
    if(type==='insc'){s+=`<polygon points="160,130 220,70 100,70" stroke="${b}" stroke-width="2" fill="none"/>`;if(p.arc)s+=V(160,50,p.arc+'°');}
  }else{
    s+=`<text x="180" y="130" text-anchor="middle" font-size="16" fill="${c}">📐 Чертеж</text>`;
  }
  s+='</svg>';
  document.getElementById('svg').innerHTML=s;
}

document.getElementById('chk').onclick=check;
document.getElementById('sol').onclick=showSol;
document.getElementById('ans').onkeydown=e=>{if(e.key==='Enter')check()};
load();updateInfo();
</script>
