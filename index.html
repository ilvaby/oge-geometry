<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Геометрия ОГЭ — практика</title>
  <style>
    :root { --primary: #2563eb; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --text-light: #64748b; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 16px; line-height: 1.5; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
    .selector-block { background: var(--card); padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 16px; }
    .selector-label { font-weight: 600; margin-bottom: 10px; display: block; color: var(--text); }
    .task-selector { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .task-btn { padding: 10px 16px; border: 2px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.95rem; }
    .task-btn:hover { border-color: var(--primary); background: #eff6ff; }
    .task-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .task-btn.part2 { background: #fef3c7; border-color: #f59e0b; }
    .task-btn.part2.active { background: #f59e0b; color: white; }
    .task-info { text-align: center; font-size: 0.9rem; color: var(--text-light); padding: 8px; background: #f1f5f9; border-radius: 6px; }
    .progress { text-align: center; color: var(--text-light); font-size: 0.9rem; margin-bottom: 16px; padding: 8px; background: #e2e8f0; border-radius: 8px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 16px; }
    #svg-container { min-height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 8px; overflow: visible; }
    #problem-text { font-size: 1.15rem; margin-bottom: 16px; line-height: 1.6; text-align: center; }
    .input-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .input-row input { flex: 1; padding: 14px; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 10px; transition: border-color 0.2s; }
    .input-row input:focus { outline: none; border-color: var(--primary); }
    .input-row .math-btn { padding: 0 14px; font-size: 1.2rem; background: #e2e8f0; border: 2px solid #cbd5e1; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.15s; min-width: 44px; }
    .input-row .math-btn:hover { background: #cbd5e1; border-color: #94a3b8; }
    .input-row .math-btn:active { transform: scale(0.96); }
    .input-row .math-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint { font-size: 0.85rem; color: var(--text-light); margin-bottom: 10px; text-align: center; background: #f0f9ff; padding: 6px 10px; border-radius: 6px; }
    .btn { display: block; width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-bottom: 8px; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .primary { background: var(--primary); color: white; }
    .secondary { background: #e2e8f0; color: var(--text); }
    .large { background: #f59e0b; color: white; font-size: 1.15rem; margin-bottom: 16px; }
    .feedback { padding: 14px; border-radius: 10px; margin-top: 12px; font-weight: 500; line-height: 1.6; }
    .success { background: #dcfce7; color: #166534; border-left: 4px solid #16a34a; }
    .error { background: #fee2e2; color: #991b1b; border-left: 4px solid #dc2626; }
    .proof-hint { background: #e0f2fe; color: #0369a1; border-left: 4px solid #0284c7; }
    .solution { margin-top: 12px; padding: 16px; background: #f8fafc; border-radius: 8px; font-size: 0.95rem; white-space: pre-line; border-left: 4px solid var(--primary); line-height: 1.7; }
    .hidden { display: none !important; }
    .difficulty { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-left: 8px; }
    .diff-basic { background: #dcfce7; color: #166534; }
    .diff-advanced { background: #fef3c7; color: #92400e; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.8rem; color: var(--text-light); }
  </style>
</head>
<body>
  <div class="container">
    <h1>📐 Геометрия ОГЭ — практика</h1>
    <div class="selector-block">
      <label class="selector-label">Выбери задание для тренировки:</label>
      <div class="task-selector">
        <button class="task-btn active" data-task="15">№15</button>
        <button class="task-btn" data-task="16">№16</button>
        <button class="task-btn" data-task="17">№17</button>
        <button class="task-btn" data-task="18">№18</button>
        <button class="task-btn" data-task="19">№19</button>
        <button class="task-btn part2" data-task="23">№23</button>
        <button class="task-btn part2" data-task="24">№24</button>
        <button class="task-btn part2" data-task="25">№25</button>
      </div>
      <div id="task-info" class="task-info"><strong>Задание 15</strong> <span class="difficulty diff-basic">Базовый уровень</span><br>Треугольники, четырёхугольники, многоугольники</div>
    </div>
    <div id="progress" class="progress hidden">📊 Статистика...</div>
    <div id="task-area" class="hidden">
      <div id="problem-block" class="card">
        <div id="svg-container"></div>
        <p id="problem-text">Нажми «🎲 Новая задача», чтобы начать!</p>
        <div class="input-row">
          <input type="text" id="answer-input" placeholder="Например: 2.4 или 12/5" disabled>
          <button class="math-btn" id="sqrt-btn" disabled>√</button>
          <button class="math-btn" id="div-btn" disabled>/</button>
        </div>
        <div class="hint">Принимаются: <b>2.4</b>, <b>2,4</b>, <b>12/5</b>, <b>4√3</b>. Калькулятор не нужен!</div>
        <button id="check-btn" class="btn primary" disabled>✅ Проверить</button>
        <button id="solution-btn" class="btn secondary" disabled>📝 Показать решение</button>
        <div id="feedback" class="feedback hidden"></div>
        <div id="solution-text" class="solution hidden"></div>
      </div>
    </div>
    <button id="new-task-btn" class="btn large hidden">🎲 Новая задача</button>
    <div class="footer">Сделано для подготовки к ОГЭ • Данные хранятся только в твоём браузере</div>
  </div>

  <script>
    function safeGet(k){ try{return localStorage.getItem(k)}catch(e){return null} }
    function safeSet(k,v){ try{localStorage.setItem(k,v)}catch(e){} }
    function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

    const state={currentTask:null,currentTaskNum:'15',solved:0,correct:0,lastDate:new Date().toDateString()};
    const taskInfo = {
      '15': { title: 'Задание 15', diff: 'Базовый уровень', desc: 'Треугольники, четырёхугольники, многоугольники' },
      '16': { title: 'Задание 16', diff: 'Базовый уровень', desc: 'Окружность, круг и их элементы' },
      '17': { title: 'Задание 17', diff: 'Базовый уровень', desc: 'Площади фигур' },
      '18': { title: 'Задание 18', diff: 'Базовый уровень', desc: 'Фигуры на клетчатой бумаге' },
      '19': { title: 'Задание 19', diff: 'Базовый уровень', desc: 'Верные/неверные утверждения' },
      '23': { title: 'Задание 23', diff: 'Повышенный уровень', desc: 'Задача на вычисление (2 балла, полное решение)' },
      '24': { title: 'Задание 24', diff: 'Повышенный уровень', desc: 'Задача на доказательство (2 балла)' },
      '25': { title: 'Задание 25', diff: 'Повышенный уровень', desc: 'Задача повышенной сложности (2 балла)' }
    };

    function loadState(){
      const s=safeGet('oge_geo_state'); if(s) Object.assign(state,JSON.parse(s));
      updateProgress(); updateTaskInfo(state.currentTaskNum);
    }
    function saveState(){ safeSet('oge_geo_state',JSON.stringify({currentTaskNum:state.currentTaskNum,solved:state.solved,correct:state.correct,lastDate:state.lastDate})); }
    function updateProgress(){ document.getElementById('progress').textContent=`📊 Решено: ${state.solved} | ✅ Верно: ${state.correct} | Текущее: №${state.currentTaskNum}`; }
    function updateTaskInfo(num){
      state.currentTaskNum=num; const info=taskInfo[num];
      const diffClass=num>=23?'diff-advanced':'diff-basic';
      document.getElementById('task-info').innerHTML=`<strong>${info.title}</strong> <span class="difficulty ${diffClass}">${info.diff}</span><br>${info.desc}`;
      document.querySelectorAll('.task-btn').forEach(btn=>{btn.classList.remove('active');if(btn.dataset.task===num) btn.classList.add('active');});
      saveState();
    }

    function insertAtCursor(symbol) {
      const input = document.getElementById('answer-input');
      const start = input.selectionStart; const end = input.selectionEnd; const text = input.value;
      input.value = text.substring(0, start) + symbol + text.substring(end);
      input.selectionStart = input.selectionEnd = start + symbol.length; input.focus();
    }

    function parseMathExpr(str) {
      if (!str) return NaN;
      str = str.toString().toLowerCase().trim().replace(/\s+/g, '').replace(/,/g, '.');
      str = str.replace(/корень(ей|я|и)?\s*(из\s*)?/gi, '√').replace(/sqrt\s*\(?/gi, '√').replace(/\)/g, '');
      if (str.includes('/')) { const [n, d] = str.split('/').map(Number); if (!isNaN(n) && !isNaN(d) && d !== 0) return n / d; }
      const sqrtMatch = str.match(/^(-?\d*\.?\d*)√(\d+)$/);
      if (sqrtMatch) { const c = sqrtMatch[1] === '' ? 1 : (sqrtMatch[1] === '-' ? -1 : parseFloat(sqrtMatch[1])); return c * Math.sqrt(parseInt(sqrtMatch[2])); }
      const num = parseFloat(str); return isNaN(num) ? NaN : num;
    }

    function checkAnswer(){
      const inp = document.getElementById('answer-input').value.trim(); if(!inp) return;
      if(state.currentTask.answer === 'proof'){
        document.getElementById('feedback').innerHTML = '✅ <b>Задача на доказательство!</b><br>Сверь своё решение с образцом ниже.';
        document.getElementById('feedback').className = 'feedback proof-hint';
        document.getElementById('feedback').classList.remove('hidden'); toggleSolution(); return;
      }
      const userVal = parseMathExpr(inp); const correctVal = parseMathExpr(state.currentTask.answer);
      const f = document.getElementById('feedback'); let isCorrect = false;
      if (!isNaN(userVal) && !isNaN(correctVal) && Math.abs(userVal - correctVal) < 0.015) isCorrect = true;
      else if (inp.toLowerCase().replace(/\s+/g,'').replace(',','.') === state.currentTask.answer.toLowerCase().replace(/\s+/g,'').replace(',','.')) isCorrect = true;

      if(isCorrect){
        const praise = ['🎉 <b>Верно! Молодец!</b><br>Ответ принят.','✅ <b>Отлично!</b><br>Точно как в бланке ОГЭ.','🌟 <b>Супер!</b><br>Так держать.','👍 <b>Правильно!</b><br>Записывай без пробелов.'];
        f.innerHTML = praise[rand(0, praise.length-1)]; f.className = 'feedback success'; state.correct++;
      } else {
        let hint = ''; const num = state.currentTaskNum;
        if(num==='15') hint = '💡 <b>Подсказка:</b> Ищи равные углы, сумму углов треугольника (180°) или свойства параллельных прямых.';
        else if(num==='16') hint = '💡 <b>Подсказка:</b> Вспомни: угол между касательной и хордой = ½ дуги. Вписанный на диаметр = 90°.';
        else if(num==='17') hint = '💡 <b>Подсказка:</b> S = a·b·sinα, S = ½·d₁·d₂·sinφ, или разбей фигуру на части.';
        else if(num==='18') hint = '💡 <b>Подсказка:</b> Окружи прямоугольником, вычти лишние треугольники или используй формулу Пика.';
        else if(num==='19') hint = '💡 <b>Подсказка:</b> Проверяй контрпримером. Не путай свойства ромба и параллелограмма.';
        else if(num==='23') hint = '💡 <b>Подсказка:</b> Ищи подобные треугольники, используй теорему о пересекающихся хордах или метрические соотношения.';
        else if(num==='24') hint = '✅ <b>Задача на доказательство.</b><br>Сверь ход с образцом. Главное — логика.';
        else if(num==='25') hint = '💡 <b>Подсказка:</b> Проведи высоту/радиус. Ищи подобие или используй площади.';
        f.innerHTML = `❌ <b>Неверно.</b><br>Правильный ответ: <b>${state.currentTask.answer}</b><br><br>${hint}<br><br>📝 <i>Нажми «Показать решение», чтобы увидеть полный разбор.</i>`;
        f.className = 'feedback error';
      }
      f.classList.remove('hidden'); saveState(); updateProgress();
    }

    function toggleSolution(){
      const s=document.getElementById('solution-text'), b=document.getElementById('solution-btn');
      if(s.classList.contains('hidden')){ s.textContent=state.currentTask.solution; s.classList.remove('hidden'); b.textContent='📝 Скрыть решение'; }
      else { s.classList.add('hidden'); b.textContent='📝 Показать решение'; }
    }

    function generateTask(){
      const num=state.currentTaskNum;
      state.currentTask=templates[num][Math.floor(Math.random()*templates[num].length)].gen();
      state.solved++; saveState(); updateProgress();
      document.getElementById('problem-text').textContent=state.currentTask.text;
      renderSVG(state.currentTask.draw, state.currentTask.params);
      document.getElementById('answer-input').value='';
      ['answer-input','check-btn','solution-btn','sqrt-btn','div-btn'].forEach(id=>document.getElementById(id).disabled=false);
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('solution-text').classList.add('hidden');
      document.getElementById('solution-btn').textContent='📝 Показать решение';
    }

    document.querySelectorAll('.task-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        updateTaskInfo(btn.dataset.task);
        document.getElementById('task-area').classList.remove('hidden');
        document.getElementById('new-task-btn').classList.remove('hidden');
        document.getElementById('progress').classList.remove('hidden');
        document.getElementById('problem-text').textContent='Нажми «🎲 Новая задача», чтобы начать!';
        document.getElementById('svg-container').innerHTML='';
        ['answer-input','check-btn','solution-btn','sqrt-btn','div-btn'].forEach(id=>document.getElementById(id).disabled=true);
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('solution-text').classList.add('hidden');
        window.scrollTo({ top: document.getElementById('task-area').offsetTop - 20, behavior: 'smooth' });
      });
    });

    document.getElementById('new-task-btn').addEventListener('click',generateTask);
    document.getElementById('check-btn').addEventListener('click',checkAnswer);
    document.getElementById('solution-btn').addEventListener('click',toggleSolution);
    document.getElementById('sqrt-btn').addEventListener('click', () => insertAtCursor('√'));
    document.getElementById('div-btn').addEventListener('click', () => insertAtCursor('/'));
    document.getElementById('answer-input').addEventListener('keydown', (e) => { if(e.key==='Enter') checkAnswer(); });

    const templates = {
      '15': [
        {gen:()=>{const A=rand(40,80),B=rand(40,80);return{text:`В треугольнике ABC ∠A=${A}°, ∠B=${B}°. Найдите внешний угол при вершине C.`,answer:A+B,solution:`Внешний ∠ = ∠A+∠B = ${A}°+${B}° = ${A+B}°\nОтвет: ${A+B}`,draw:'triangle',params:{A,B}}}},
        {gen:()=>{const base=rand(10,16),leg=rand(6,12);return{text:`Периметр равнобедренного треугольника равен ${base+2*leg} см, основание — ${base} см. Найдите боковую сторону.`,answer:leg,solution:`P = a+2b ⇒ 2b = P-a = ${base+2*leg}-${base} = ${2*leg} ⇒ b=${leg}\nОтвет: ${leg}`,draw:'isosceles',params:{base:base,side:leg}}}},
        {gen:()=>{const a=rand(50,70);return{text:`В равнобедренной трапеции ABCD (AD||BC) угол BAD=${a}°. Найдите угол ABC.`,answer:180-a,solution:`В трапеции углы при боковой стороне в сумме 180°.\n∠ABC = 180°-${a}° = ${180-a}°\nОтвет: ${180-a}`,draw:'isosceles_trap',params:{A:a}}}
      ],
      '16': [
        {gen:()=>{const arc=rand(80,160);return{text:`Хорда AB стягивает дугу ${arc}°. Найдите угол между хордой AB и касательной в точке B.`,answer:arc/2,solution:`Угол = ½ дуги = ${arc}°/2 = ${arc/2}°\nОтвет: ${arc/2}`,draw:'tangent_chord_angle',params:{arc}}}},
        {gen:()=>{const R=rand(5,12);return{text:`Длина окружности равна ${Math.round(2*3.14*R*10)/10} см. Найдите радиус (π≈3.14).`,answer:R,solution:`C=2πR ⇒ R=C/(2π)=${Math.round(2*3.14*R*10)/10}/6.28=${R}\nОтвет: ${R}`,draw:'circle',params:{R}}}},
        {gen:()=>{const A=rand(30,60);return{text:`В окружности проведён диаметр AC. ∠BAC=${A}°. Найдите ∠BCA.`,answer:90-A,solution:`∠ABC=90° (опирается на диаметр).\n∠BCA = 180°-90°-${A}° = ${90-A}°\nОтвет: ${90-A}`,draw:'diameter_tri',params:{A,B:90-A}}}
      ],
      '17': [
        {gen:()=>{const d1=rand(8,16),d2=rand(6,12);return{text:`Диагонали ромба равны ${d1} см и ${d2} см. Найдите площадь.`,answer:(d1*d2)/2,solution:`S = (d₁·d₂)/2 = (${d1}·${d2})/2 = ${(d1*d2)/2}\nОтвет: ${(d1*d2)/2}`,draw:'rhombus',params:{d1,d2}}}},
        {gen:()=>{const a=rand(5,10),h=rand(4,9);return{text:`Сторона параллелограмма ${a} см, высота к ней ${h} см. Найдите площадь.`,answer:a*h,solution:`S = a·h = ${a}·${h} = ${a*h}\nОтвет: ${a*h}`,draw:'rectangle',params:{a,b:h}}}},
        {gen:()=>{const a=rand(4,8),b=rand(4,8),alpha=rand(30,60);const S=Math.round(a*b*Math.sin(alpha*Math.PI/180)*10)/10;return{text:`Стороны треугольника ${a} см и ${b} см, угол между ними ${alpha}°. Найдите площадь.`,answer:S,solution:`S = ½ab·sinα = ½·${a}·${b}·sin(${alpha}°) ≈ ${S}\nОтвет: ${S}`,draw:'triangle_area_2sides',params:{a,b,C:alpha,S}}}
      ],
      '18': [
        {gen:()=>{const w=rand(3,7),h=rand(3,6);return{text:`Прямоугольник на клетках имеет размеры ${w}×${h}. Найдите площадь.`,answer:w*h,solution:`S = w·h = ${w}·${h} = ${w*h}\nОтвет: ${w*h}`,draw:'grid_rect',params:{w,h}}}},
        {gen:()=>{const a=rand(2,5),b=rand(2,5);return{text:`Прямоугольный △ на клетках с катетами ${a} и ${b}. Найдите площадь.`,answer:(a*b)/2,solution:`S = (a·b)/2 = (${a}·${b})/2 = ${(a*b)/2}\nОтвет: ${(a*b)/2}`,draw:'grid_tri',params:{a,b}}}},
        {gen:()=>{const x1=rand(0,4),y1=rand(0,4),x2=rand(5,9),y2=rand(5,9),x3=rand(2,7),y3=rand(8,12);const S=Math.abs(x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2;return{text:`△ с вершинами (${x1},${y1}), (${x2},${y2}), (${x3},${y3}). Найдите площадь.`,answer:S,solution:`S = |x₁(y₂-y₃)+...|/2 = ${S}\nОтвет: ${S}`,draw:'grid_tri_coords',params:{S}}}
      ],
      '19': [
        {gen:()=>{return{text:`Какие верны? (Номера подряд)\n1) В любой △ можно вписать окружность\n2) Диагонали прямоугольника перпендикулярны\n3) Противоположные стороны параллелограмма равны`,answer:'13',solution:`1) ✓ 2) ✗ 3) ✓\nОтвет: 13`,draw:'statements',params:{}}}},
        {gen:()=>{return{text:`Какое НЕВЕРНО?\n1) Сумма углов △ 180°\n2) В любой параллелограмм вписана окружность\n3) Площадь квадрата = a²`,answer:'2',solution:`2) ✗ (только если суммы противоположных сторон равны)\nОтвет: 2`,draw:'statements',params:{}}}}
      ],
      '23': [
        {gen:()=>{const BC=rand(3,6),AD=rand(BC*2,BC*4);const AC=Math.round(Math.sqrt(BC*AD)*10)/10;return{text:`В трапеции ABCD ∠ABC=∠ACD, BC=${BC}, AD=${AD}. Найдите AC.`,answer:AC,solution:`△ABC ~ △DCA ⇒ AC²=BC·AD=${BC*AD}\nAC=√${BC*AD}=${AC}\nОтвет: ${AC}`,draw:'trapezoid_similar',params:{BC,AD,AC}}}},
        {gen:()=>{const AK=rand(3,8),KB=rand(2,6),CK=rand(2,5);const KD=Math.round((AK*KB)/CK*10)/10;return{text:`Хорды AB и CD пересекаются в K. AK=${AK}, KB=${KB}, CK=${CK}. Найдите KD.`,answer:KD,solution:`AK·KB = CK·KD ⇒ KD = ${AK}·${KB}/${CK} = ${KD}\nОтвет: ${KD}`,draw:'intersecting_chords',params:{AK,KB,CK,KD}}}},
        {gen:()=>{const AH=rand(3,6),CH=rand(4,8);const BH=Math.round(CH*CH/AH*10)/10;return{text:`В прямот. △ ABC высота CH. AH=${AH}, CH=${CH}. Найдите BH.`,answer:BH,solution:`CH²=AH·BH ⇒ BH=CH²/AH = ${CH*CH}/${AH} = ${BH}\nОтвет: ${BH}`,draw:'right_alt_seg',params:{AH,CH,BH}}}
      ],
      '24': [
        {gen:()=>{return{text:`В △ABC проведены высоты AD и BE. Докажите, что △ABE ~ △ADC.`,answer:'proof',solution:`1) ∠AEB=∠ADC=90°\n2) ∠A — общий\n3) △ABE ~ △ADC по двум углам\nЧто и требовалось доказать.`,draw:'proof_altitudes',params:{}}}},
        {gen:()=>{return{text:`В параллелограмме ABCD M — середина BC. AM∩BD=K. Докажите, что BK:KD=1:2.`,answer:'proof',solution:`1) AD||BC ⇒ накрест лежащие равны\n2) △BKM ~ △DKA\n3) BK/KD = BM/AD = 1/2\nЧто и требовалось доказать.`,draw:'proof_midpoint',params:{}}}
      ],
      '25': [
        {gen:()=>{const S1=rand(2,4),S2=rand(S1*3,S1*7);const S=Math.round((Math.sqrt(S1)+Math.sqrt(S2))*(Math.sqrt(S1)+Math.sqrt(S2)));return{text:`В трапеции ABCD диагонали пересекаются в O. S△BOC=${S1}, S△AOD=${S2}. Найдите Sтрап.`,answer:S,solution:`Sтрап = (√S₁+√S₂)² = ${S}\nОтвет: ${S}`,draw:'trapezoid_diag_areas',params:{S1,S2,S}}}},
        {gen:()=>{const AB=rand(6,9),BC=rand(8,11),CA=Math.round(Math.sqrt(AB*AB+BC*BC)*10)/10;const AD=Math.round(AB*CA/BC*10)/10;return{text:`В прямот. трапеции ABCD (∠A=∠B=90°) AC⊥CD, AB=${AB}, BC=${BC}. Найдите AD.`,answer:AD,solution:`AC=√(AB²+BC²)=${CA}\n△ABC ~ △CAD ⇒ AD=(AC·BC)/AB=${AD}\nОтвет: ${AD}`,draw:'right_trapezoid_similar',params:{AB,BC,CA,AD}}}
      ]
    };

    function renderSVG(type, p) {
      const c = document.getElementById('svg-container');
      let svg = `<svg viewBox="0 0 360 260" style="width:100%;max-width:340px;overflow:visible;">`;
      svg += `<style>.line{stroke:#334155;stroke-width:2;stroke-linecap:round;fill:none}.dashed{stroke:#334155;stroke-width:1.5;stroke-dasharray:4,3;fill:none}.blue{stroke:#2563eb}.red{stroke:#dc2626}text{font-family:sans-serif;font-weight:600;font-size:15px}.lbl{fill:#334155}.val{fill:#2563eb}.ask{fill:#dc2626;font-weight:700}</style>`;
      function vLabel(x,y,t,a="middle",dy=-10){svg+=`<text x="${x}" y="${y+dy}" text-anchor="${a}" class="lbl">${t}</text>`;}

      if(type==='triangle'){const A=[180,60],B=[60,200],C=[300,200];svg+=`<polygon points="${A} ${B} ${C}" class="line"/>`;vLabel(A[0],A[1],'A','middle',-12);vLabel(B[0],B[1],'B','end',8);vLabel(C[0],C[1],'C','start',8);if(p.A)svg+=`<text x="130" y="95" class="val">${p.A}°</text>`;if(p.B)svg+=`<text x="90" y="170" class="val">${p.B}°</text>`;svg+=`<text x="240" y="170" class="ask">вн. ∠C=?</text>`;}
      else if(type==='isosceles'){const A=[80,200],B=[280,200],C=[180,50];svg+=`<polygon points="${A} ${B} ${C}" class="line"/>`;vLabel(A[0],A[1],'A','start',14);vLabel(B[0],B[1],'B','end',14);vLabel(C[0],C[1],'C','middle',-12);svg+=`<text x="180" y="215" text-anchor="middle" class="val">${p.base||''}</text>`;svg+=`<text x="115" y="125" text-anchor="middle" class="val">${p.side||''}</text>`;}
      else if(type==='rectangle'){const x=50,y=70,w=260,h=120;svg+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" class="line"/>`;vLabel(x+8,y+8,'A','start',-8);vLabel(x+w-8,y+8,'B','end',-8);vLabel(x+w-8,y+h-8,'C','end',12);vLabel(x+8,y+h-8,'D','start',12);svg+=`<text x="${x+w/2}" y="${y-10}" class="val">${p.a||''}</text>`;svg+=`<text x="${x-10}" y="${y+h/2+5}" text-anchor="end" class="val">${p.b||''}</text>`;}
      else if(type==='rhombus'){const cx=180,cy=130,dx=90,dy=60;svg+=`<polygon points="${cx},${cy-dy} ${cx+dx},${cy} ${cx},${cy+dy} ${cx-dx},${cy}" class="line"/>`;svg+=`<line x1="${cx-dx}" y1="${cy}" x2="${cx+dx}" y2="${cy}" class="dashed"/>`;svg+=`<line x1="${cx}" y1="${cy-dy}" x2="${cx}" y2="${cy+dy}" class="dashed"/>`;vLabel(cx,cy-dy,'A','middle',-12);vLabel(cx+dx,cy,'B','start',6);vLabel(cx,cy+dy,'C','middle',14);vLabel(cx-dx,cy,'D','end',6);}
      else if(type==='circle'||type==='diameter_tri'){const O=[160,130],r=60;svg+=`<circle cx="${O[0]}" cy="${O[1]}" r="${r}" class="line"/>`;vLabel(O[0],O[1],'O','middle',18);if(type==='diameter_tri'){svg+=`<line x1="${O[0]-r}" y1="${O[1]}" x2="${O[0]+r}" y2="${O[1]}" class="line blue"/>`;svg+=`<polygon points="${O[0]-r},${O[1]} ${O[0]+r},${O[1]} ${O[0]},${O[1]-r}" class="line"/>`;svg+=`<rect x="${O[0]-4}" y="${O[1]-4}" width="8" height="8" fill="none" stroke="#475569" stroke-width="1.5"/>`;vLabel(O[0]-r,O[1],'A','start',-10);vLabel(O[0]+r,O[1],'C','end',-10);vLabel(O[0],O[1]-r,'B','middle',-12);if(p.A)svg+=`<text x="${O[0]-40}" y="${O[1]-35}" class="val">${p.A}°</text>`;}}
      else if(type==='tangent_chord_angle'){const O=[160,130],r=60;svg+=`<circle cx="${O[0]}" cy="${O[1]}" r="${r}" class="line"/>`;svg+=`<line x1="${O[0]+r}" y1="${O[1]}" x2="${O[0]+r+60}" y2="${O[1]-60}" class="line blue"/>`;svg+=`<line x1="${O[0]+r}" y1="${O[1]}" x2="${O[0]-r}" y2="${O[1]}" class="dashed"/>`;vLabel(O[0],O[1],'O','middle',18);vLabel(O[0]+r,O[1],'B','start',18);vLabel(O[0]-r,O[1],'A','start',-10);svg+=`<text x="${O[0]+r+25}" y="${O[1]-30}" class="ask">∠=?</text>`;}
      else if(type==='trapezoid_similar'||type==='trapezoid_mid'||type==='trapezoid_diag_areas'||type==='isosceles_trap'){svg+=`<polygon points="90,180 270,180 220,60 140,60" class="line"/>`;svg+=`<line x1="90" y1="180" x2="220" y2="60" class="dashed blue"/>`;vLabel(90,180,'A','start',14);vLabel(270,180,'D','end',14);vLabel(220,60,'C','end',-12);vLabel(140,60,'B','start',-12);if(p.a)svg+=`<text x="180" y="195" class="val">${p.a}</text>`;if(p.b)svg+=`<text x="180" y="45" class="val">${p.b}</text>`;}
      else if(type==='tangent_secant'){svg+=`<circle cx="150" cy="130" r="60" class="line"/>`;svg+=`<line x1="290" y1="130" x2="100" y2="130" class="line blue"/>`;svg+=`<line x1="290" y1="130" x2="190" y2="70" class="line red"/>`;vLabel(150,130,'O','middle',18);vLabel(290,130,'A','end',20);vLabel(190,70,'B','start',-12);vLabel(100,130,'C','start',-10);vLabel(130,130,'D','middle',-10);}
      else if(type==='intersecting_chords'){svg+=`<circle cx="180" cy="130" r="70" class="line"/>`;svg+=`<line x1="110" y1="130" x2="250" y2="130" class="line blue"/>`;svg+=`<line x1="130" y1="70" x2="230" y2="190" class="line red"/>`;vLabel(180,130,'K','middle',18);vLabel(110,130,'A','start',-10);vLabel(250,130,'B','end',-10);vLabel(130,70,'C','start',-12);vLabel(230,190,'D','end',14);}
      else if(type==='right_alt_seg'){const A=[100,180],B=[260,180],C=[180,60],H=[180,180];svg+=`<polygon points="${A} ${B} ${C}" class="line"/>`;svg+=`<line x1="${C[0]}" y1="${C[1]}" x2="${H[0]}" y2="${H[1]}" class="dashed blue"/>`;svg+=`<rect x="${H[0]-4}" y="${H[1]-4}" width="8" height="8" fill="none" stroke="#475569" stroke-width="1.5"/>`;svg+=`<rect x="${C[0]-4}" y="${C[1]-4}" width="8" height="8" fill="none" stroke="#475569" stroke-width="1.5"/>`;vLabel(A[0],A[1],'A','start',14);vLabel(B[0],B[1],'B','end',14);vLabel(C[0],C[1],'C','middle',-12);vLabel(H[0],H[1],'H','start',16);if(p.AH)svg+=`<text x="${(A[0]+H[0])/2}" y="${A[1]+22}" class="val">AH=${p.AH}</text>`;if(p.CH)svg+=`<text x="${C[0]+10}" y="${(C[1]+H[1])/2+6}" class="val">CH=${p.CH}</text>`;if(p.BH!==undefined)svg+=`<text x="${(H[0]+B[0])/2}" y="${B[1]+22}" class="ask">BH=?</text>`;}
      else if(type==='triangle_area_2sides'){const A=[100,180],B=[260,180],C=[160,70];svg+=`<polygon points="${A} ${B} ${C}" class="line"/>`;vLabel(A[0],A[1],'A','start',14);vLabel(B[0],B[1],'B','end',14);vLabel(C[0],C[1],'C','middle',-12);if(p.a)svg+=`<text x="${(A[0]+C[0])/2-10}" y="${(A[1]+C[1])/2}" class="val">${p.a}</text>`;if(p.b)svg+=`<text x="${(B[0]+C[0])/2+10}" y="${(B[1]+C[1])/2}" class="val">${p.b}</text>`;}
      else if(type==='grid_tri_coords'||type==='grid_cut_rect'){svg+=`<text x="180" y="110" text-anchor="middle" fill="#334155" font-size="16" font-weight="600">📐 Фигура на клетчатой бумаге</text>`;}
      else if(type==='proof_altitudes'||type==='proof_midpoint'){svg+=`<polygon points="100,180 260,180 180,60" class="line"/>`;svg+=`<line x1="180" y1="60" x2="180" y2="180" class="dashed blue"/>`;svg+=`<line x1="140" y1="180" x2="200" y2="120" class="dashed red"/>`;vLabel(100,180,'A','start',14);vLabel(260,180,'B','end',14);vLabel(180,60,'C','middle',-12);vLabel(180,180,'D','middle',18);svg+=`<text x="180" y="130" text-anchor="middle" class="lbl">H</text>`;}
      else { svg += `<text x="180" y="110" text-anchor="middle" fill="#334155" font-size="16" font-weight="600">📐 Задача</text>`; }
      svg += `</svg>`; c.innerHTML = svg;
    }
    loadState();
  </script>
