<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Геометрия ОГЭ 2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f8fafc;color:#1e293b;padding:12px;line-height:1.4}
.wrap{max-width:600px;margin:0 auto}
h1{text-align:center;margin:10px 0;font-size:clamp(1.3rem,5vw,1.5rem)}
.box{background:#fff;padding:14px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.b{padding:8px 12px;border:2px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-size:clamp(13px,3.5vw,14px);min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.b:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.b.on{background:#2563eb;color:#fff;border-color:#2563eb}
.b.hard{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.b.hard.on{background:#f59e0b;color:#fff}
.info{text-align:center;font-size:13px;color:#475569;background:#f0f9ff;padding:8px;border-radius:8px;margin-bottom:8px}
#err{display:none;background:#fee2e2;color:#dc2626;padding:10px;border-radius:8px;margin-bottom:10px;border-left:4px solid #dc2626;font-size:14px}
#task{display:none}#task.show{display:block}
#svg{min-height:240px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:10px;overflow:visible}
#q{font-size:clamp(14px,4vw,15px);text-align:center;margin-bottom:12px;line-height:1.5}
.row{display:flex;gap:6px;margin-bottom:8px}
.row input{flex:1;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;background:#fff;color:#1e293b;min-height:44px}
.row input:focus{outline:none;border-color:#2563eb}
.sym{padding:0 14px;background:#e2e8f0;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-weight:700;font-size:16px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;color:#334155}
.sym:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.hint{font-size:12px;color:#64748b;text-align:center;margin-bottom:10px;background:#f0f9ff;padding:6px;border-radius:6px}
.act{display:block;width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:15px;margin-bottom:6px;min-height:48px}
.act:disabled{opacity:.5;cursor:not-allowed}
.ok{background:#2563eb;color:#fff}.sec{background:#e2e8f0;color:#334155}.hint-btn{background:#f0f9ff;color:#0369a1;border:2px solid #0369a1;margin-bottom:8px}
.main{background:#f59e0b;color:#fff;font-size:16px;margin-bottom:12px}
.fb{padding:10px;border-radius:8px;margin-top:8px;font-size:14px;display:none}
.fb.y{display:block;background:#dcfce7;color:#166534;border-left:4px solid #16a34a}
.fb.n{display:block;background:#fee2e2;color:#dc2626;border-left:4px solid #dc2626}
.fb.p{display:block;background:#e0f2fe;color:#0369a1;border-left:4px solid #0284c7}
.sol{margin-top:10px;padding:12px;background:#f8fafc;border-radius:8px;font-size:14px;white-space:pre-line;border-left:4px solid #2563eb;display:none}
.sol.show{display:block}
.hint-card{background:#f0f9ff;border:2px solid #0369a1;border-radius:10px;padding:12px;margin:8px 0;font-size:14px;display:none;animation:slideIn .2s ease}
.hint-card.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.hint-title{font-weight:700;color:#0369a1;margin-bottom:4px}
@media(max-width:480px){.wrap{padding:0 4px}.box{padding:12px}.btns{gap:4px}.b{padding:6px 10px;font-size:13px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>📐 Геометрия ОГЭ 2.0</h1>
  <div id="err"></div>
  <div class="box">
    <div class="btns">
      <button type="button" class="b on" onclick="sel('15')">№15</button>
      <button type="button" class="b" onclick="sel('16')">№16</button>
      <button type="button" class="b" onclick="sel('17')">№17</button>
      <button type="button" class="b" onclick="sel('18')">№18</button>
      <button type="button" class="b" onclick="sel('19')">№19</button>
      <button type="button" class="b hard" onclick="sel('23')">№23</button>
      <button type="button" class="b hard" onclick="sel('24')">№24</button>
      <button type="button" class="b hard" onclick="sel('25')">№25</button>
    </div>
    <div id="inf" class="info"><b>Задание 15</b><br>Треугольники, биссектрисы</div>
  </div>
  <div id="task" class="show">
    <div class="box">
      <button type="button" id="hintBtn" class="act hint-btn" onclick="toggleHint()" disabled>💡 Показать подсказку</button>
      <div id="hintCard" class="hint-card"><div class="hint-title">📘 Теорема</div><div id="hintText"></div></div>
      <div id="svg"></div>
      <div id="q">Нажми «🎲 Новая задача»</div>
      <div class="row">
        <input type="text" id="ans" placeholder="Ответ: 2.4 или 12/5" disabled>
        <button type="button" class="sym" onclick="ins('√')">√</button>
        <button type="button" class="sym" onclick="ins('/')">/</button>
        <button type="button" class="sym" onclick="ins('*')">×</button>
      </div>
      <div class="hint">Принимаются: 2.4 | 2,4 | 12/5 | 4√3 | √12*2</div>
      <button type="button" id="chk" class="act ok" disabled>✅ Проверить</button>
      <button type="button" id="sol" class="act sec" disabled>📝 Решение</button>
      <div id="fb" class="fb"></div>
      <div id="sol-box" class="sol"></div>
    </div>
  </div>
  <button type="button" class="act main" onclick="gen()">🎲 Новая задача</button>
  <footer style="text-align:center;margin-top:16px;font-size:12px;color:#64748b">Реальные задачи из Решу ОГЭ • v2.1</footer>
</div>

<script>
// ==================== БАНК ЗАДАЧ (РЕАЛЬНЫЕ ИЗ РЕШУ ОГЭ) ====================
const TASK_BANK = {
'15':[
  {f:()=>{const A=32,B=56;return{txt:`В △ABC ∠A=${A}°, ∠B=${B}°. Найди ∠C.`,ans:180-A-B,sol:`∠C=180°-${A}°-${B}°=${180-A-B}°\nОтвет: ${180-A-B}`,d:'triangle',p:{A,B},hint:'Сумма углов треугольника равна 180°'}},
  {f:()=>{const A=45,B=67;return{txt:`В △ABC ∠A=${A}°, ∠B=${B}°. Найди внешний ∠ при C.`,ans:A+B,sol:`Внешний ∠ = ∠A+B = ${A+B}°\nОтвет: ${A+B}`,d:'triangle',p:{A,B},hint:'Внешний угол = сумме двух внутренних, не смежных с ним'}},
  {f:()=>{const α=84;return{txt:`В △ABC AD — биссектриса, ∠BAC=${α}°. Найди ∠BAD.`,ans:α/2,sol:`∠BAD = ${α}°/2 = ${α/2}°\nОтвет: ${α/2}`,d:'bisector',p:{alpha:α},hint:'Биссектриса делит угол пополам'}},
  {f:()=>{const base=14,leg=9;return{txt:`P равнобедр. △ = ${base+2*leg}, основание=${base}. Найди боковую.`,ans:leg,sol:`2a = ${base+2*leg}-${base} = ${2*leg} ⇒ a=${leg}\nОтвет: ${leg}`,d:'isosceles',p:{base,side:leg},hint:'P = 2a + b'}},
  {f:()=>{const A=54;return{txt:`В равноб. трапеции ∠BAD=${A}°. Найди ∠ABC.`,ans:180-A,sol:`∠ABC=180°-${A}°=${180-A}°\nОтвет: ${180-A}`,d:'isosceles_trap',p:{A},hint:'Сумма углов при боковой стороне = 180°'}},
  {f:()=>{const A=38;return{txt:`В △ABC AB=BC, ∠A=${A}°. Найди ∠B.`,ans:180-2*A,sol:`∠C=∠A=${A}° ⇒ ∠B=180°-2·${A}°=${180-2*A}°\nОтвет: ${180-2*A}`,d:'isosceles',p:{A},hint:'Углы при основании равны'}},
  {f:()=>{const h=6,a=11;return{txt:`S△=${h*a/2}, высота=${h}. Найди основание.`,ans:a,sol:`a=2S/h=2·${h*a/2}/${h}=${a}\nОтвет: ${a}`,d:'triangle_area',p:{S:h*a/2,h},hint:'S = ½·a·h'}},
  {f:()=>{const A=73,B=53;return{txt:`В △ABC биссектрисы ∠A и ∠B пересекаются в O, ∠A=${A}°, ∠B=${B}°. Найди ∠AOB.`,ans:90+(180-A-B)/2,sol:`∠C=180-${A}-${B}=${180-A-B}°\n∠AOB=90°+∠C/2=90+${180-A-B}/2=${90+(180-A-B)/2}°\nОтвет: ${90+(180-A-B)/2}`,d:'bisector_int',p:{A,B},hint:'∠AOB = 90° + ∠C/2'}}
],
'16':[
  {f:()=>{const arc=124;return{txt:`Дуга AB=${arc}°. Угол между хордой и касательной в B?`,ans:arc/2,sol:`Угол = ½ дуги = ${arc/2}°\nОтвет: ${arc/2}`,d:'tangent_chord_angle',p:{arc},hint:'Угол = ½ дуги между ними'}},
  {f:()=>{const R=8;return{txt:`C окр. = ${Math.round(2*3.14*R*10)/10} (π≈3.14). Найди R.`,ans:R,sol:`R=C/2π=${R}\nОтвет: ${R}`,d:'circle',p:{R},hint:'C = 2πR'}},
  {f:()=>{const A=36;return{txt:`AC — диаметр. ∠BAC=${A}°. Найди ∠BCA.`,ans:90-A,sol:`∠B=90° ⇒ ∠C=90°-${A}°=${90-A}°\nОтвет: ${90-A}`,d:'diameter_tri',p:{A},hint:'Вписанный на диаметре — прямой'}},
  {f:()=>{const arc=118;return{txt:`Вписанный ∠ опирается на дугу ${arc}°. Чему равен угол?`,ans:arc/2,sol:`∠ = ½·${arc} = ${arc/2}°\nОтвет: ${arc/2}`,d:'inscribed_angle',p:{arc},hint:'Вписанный = ½ дуги'}},
  {f:()=>{const α=56;return{txt:`Центральный ∠=${α}°. Вписанный на ту же дугу?`,ans:α/2,sol:`∠ = ${α}/2 = ${α/2}°\nОтвет: ${α/2}`,d:'central_inscribed',p:{α},hint:'Вписанный = ½ центрального'}},
  {f:()=>{const R=10,d=6;const chord=2*Math.sqrt(R*R-d*d);return{txt:`R=${R}, расстояние до хорды=${d}. Длина хорды?`,ans:Math.round(chord*10)/10,sol:`½ хорды = √(${R}²-${d}²)=${Math.sqrt(R*R-d*d)}\nХорда = 2·${Math.sqrt(R*R-d*d)}=${chord}\nОтвет: ${Math.round(chord*10)/10}`,d:'chord_dist',p:{R,d},hint:'Перпендикуляр из центра делит хорду пополам'}}
],
'17':[
  {f:()=>{const d1=14,d2=10;return{txt:`d₁=${d1}, d₂=${d2}. S ромба?`,ans:(d1*d2)/2,sol:`S=${d1}·${d2}/2=${(d1*d2)/2}\nОтвет: ${(d1*d2)/2}`,d:'rhombus',p:{d1,d2},hint:'S = ½·d₁·d₂'}},
  {f:()=>{const a=8,h=6;return{txt:`Сторона=${a}, высота=${h}. S параллелограмма?`,ans:a*h,sol:`S=${a}·${h}=${a*h}\nОтвет: ${a*h}`,d:'rectangle',p:{a,b:h},hint:'S = a·h'}},
  {f:()=>{const a=6,b=8,α=30;const S=a*b*Math.sin(α*Math.PI/180)/2;return{txt:`a=${a}, b=${b}, ∠=${α}°. S△?`,ans:S,sol:`S=½·${a}·${b}·sin${α}°≈${S}\nОтвет: ${S}`,d:'triangle_area_2sides',p:{a,b,C:α},hint:'S = ½ab·sinγ'}},
  {f:()=>{const a=5,b=12;return{txt:`Катеты прямот. △: ${a} и ${b}. S?`,ans:(a*b)/2,sol:`S=½·${a}·${b}=${(a*b)/2}\nОтвет: ${(a*b)/2}`,d:'right_tri_area',p:{a,b},hint:'S = ½·катет·катет'}},
  {f:()=>{const a=7,b=24;const c=Math.sqrt(a*a+b*b);const h=a*b/c;return{txt:`Катеты прямот. △: ${a} и ${b}. Высота к гипотенузе?`,ans:Math.round(h*10)/10,sol:`c=√(${a}²+${b}²)=${c}\nh=ab/c=${a*b}/${c}=${h}\nОтвет: ${Math.round(h*10)/10}`,d:'right_alt_hyp',p:{a,b},hint:'h = (a·b)/c'}}
],
'18':[
  {f:()=>{const w=5,h=4;return{txt:`Прямоугольник ${w}×${h} клеток. S?`,ans:w*h,sol:`S=${w*h}\nОтвет: ${w*h}`,d:'grid_rect',p:{w,h},hint:'S = w·h'}},
  {f:()=>{const a=4,b=3;return{txt:`Прямоуг. △ катеты ${a}, ${b}. S?`,ans:(a*b)/2,sol:`S=${(a*b)/2}\nОтвет: ${(a*b)/2}`,d:'grid_tri',p:{a,b},hint:'S = ½·a·b'}},
  {f:()=>{const x1=1,y1=1,x2=5,y2=1,x3=3,y3=4;const S=Math.abs(x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2;return{txt:`△(${x1},${y1}), (${x2},${y2}), (${x3},${y3}). S?`,ans:S,sol:`S=${S}\nОтвет: ${S}`,d:'grid_tri_coords',p:{S},hint:'Формула Гаусса'}}
],
'19':[
  {f:()=>({txt:`Верны? (номера подряд)\n1) В любой △ вписана окр.\n2) Диаг. прямоуг. ⟂\n3) Прот. стороны параллелогр. равны`,ans:'13',sol:`1) ✓ 2) ✗ 3) ✓\nОтвет: 13`,d:'statements',p:{},hint:'Проверяй контрпримерами'}),
  {f:()=>({txt:`Неверно?\n1) Сумма углов △ 180°\n2) В любой параллелогр. вписана окр.\n3) Sквадрата=a²`,ans:'2',sol:`2) ✗\nОтвет: 2`,d:'statements',p:{},hint:'Не в любой'}),
  {f:()=>({txt:`Верно?\n1) Биссектриса равноб. △ — медиана\n2) Диаг. трапеции равны\n3) Центр описанной окр. △ — пересечение медиан`,ans:'1',sol:`1) ✓ 2) ✗ 3) ✗\nОтвет: 1`,d:'statements',p:{},hint:'Запоминай свойства'})
],
'23':[
  {f:()=>{const BC=4,AD=16;const AC=Math.sqrt(BC*AD);return{txt:`В трапеции ∠ABC=ACD, BC=${BC}, AD=${AD}. AC?`,ans:AC,sol:`AC²=${BC}·${AD}=${BC*AD}\nAC=${AC}\nОтвет: ${AC}`,d:'trapezoid_similar',p:{BC,AD,AC},hint:'△ABC~△DCA ⇒ AC²=BC·AD'}},
  {f:()=>{const AK=6,KB=4,CK=3;const KD=(AK*KB)/CK;return{txt:`Хорды пересекаются в K. AK=${AK}, KB=${KB}, CK=${CK}. KD?`,ans:KD,sol:`${AK}·${KB}=${CK}·KD\nKD=${KD}\nОтвет: ${KD}`,d:'intersecting_chords',p:{AK,KB,CK,KD},hint:'AK·KB=CK·KD'}},
  {f:()=>{const AH=4,CH=8;const BH=(CH*CH)/AH;return{txt:`В прямот. △ высота CH. AH=${AH}, CH=${CH}. BH?`,ans:BH,sol:`${CH}²=${AH}·BH\nBH=${BH}\nОтвет: ${BH}`,d:'right_alt_seg',p:{AH,CH,BH},hint:'CH²=AH·BH'}},
  {f:()=>{const a=6,b=8;const h=a*b/Math.sqrt(a*a+b*b);return{txt:`Катеты прямот. △: ${a} и ${b}. Высота к гипотенузе?`,ans:Math.round(h*10)/10,sol:`h=${a}·${b}/√(${a}²+${b}²)=${h.toFixed(1)}\nОтвет: ${Math.round(h*10)/10}`,d:'right_alt_hyp',p:{a,b,h},hint:'h=ab/c'}}
],
'24':[
  {f:()=>({txt:`В △ABC высоты AD и BE. Докажи: △ABE ~ △ADC.`,ans:'proof',sol:`1) ∠AEB=∠ADC=90°\n2) ∠A — общий\n3) ~ по двум углам\n✓`,d:'proof_altitudes',p:{},hint:'Подобие по двум углам'}),
  {f:()=>({txt:`ABCD — параллелогр., M — сер. BC, AM∩BD=K. Докажи: BK:KD=1:2`,ans:'proof',sol:`1) △BKM ~ △DKA\n2) BK/KD=BM/AD=1/2\n✓`,d:'proof_midpoint',p:{},hint:'Используй подобие'}),
  {f:()=>({txt:`В △ABC биссектриса BD. Докажи: AB/BC = AD/DC.`,ans:'proof',sol:`1) CE ∥ BD\n2) △BCE равнобедр.\n3) AB/BC=AD/DC\n✓`,d:'proof_bisector',p:{},hint:'Свойство биссектрисы'}),
  {f:()=>({txt:`ABCD — вписанный четырёхугольник. Докажи: ∠A+∠C=180°.`,ans:'proof',sol:`1) ∠A=½дуги BCD\n2) ∠C=½дуги BAD\n3) ∠A+C=180°\n✓`,d:'proof_cyclic',p:{},hint:'Вписанный = ½ дуги'})
],
'25':[
  {f:()=>{const S1=3,S2=12;const S=(Math.sqrt(S1)+Math.sqrt(S2))**2;return{txt:`В трапеции S△BOC=${S1}, S△AOD=${S2}. Sтрап?`,ans:S,sol:`S=(√${S1}+√${S2})²=${S}\nОтвет: ${S}`,d:'trapezoid_diag_areas',p:{S1,S2,S},hint:'S=(√S₁+√S₂)²'}),
  {f:()=>{const AB=8,BC=15,CA=17;const AD=AB*CA/BC;return{txt:`В прямот. трапеции AC⊥CD, AB=${AB}, BC=${BC}. AD?`,ans:Math.round(AD*10)/10,sol:`AC=${CA}\nAD=(${CA}·${BC})/${AB}=${AD.toFixed(1)}\nОтвет: ${Math.round(AD*10)/10}`,d:'right_trapezoid_similar',p:{AB,BC,CA,AD},hint:'△ABC~△CAD'})}
]
};

// ==================== ЯДРО ====================
window.onerror=function(m,u,l){document.getElementById('err').innerHTML='❌ Ошибка: '+m+' (строка '+l+')';document.getElementById('err').style.display='block';return true};
try{
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
let mem={};function gs(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}}function ss(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}
const S={n:'15',task:null,solved:0,ok:0};
const Info={'15':['№15','Базовый','Треугольники, биссектрисы'],'16':['№16','Базовый','Окружность'],'17':['№17','Базовый','Площади'],'18':['№18','Базовый','Клетчатая бумага'],'19':['№19','Базовый','Утверждения'],'23':['№23','Повышенный','Вычисления'],'24':['№24','Повышенный','Доказательства'],'25':['№25','Повышенный','Сложные']};
function init(){const d=gs('oge_s2');if(d)Object.assign(S,JSON.parse(d));upd()}
function save(){ss('oge_s2',JSON.stringify({n:S.n,solved:S.solved,ok:S.ok}))}
function upd(){document.getElementById('inf').innerHTML=`<b>${Info[S.n][0]}</b><br>${Info[S.n][2]}`;document.querySelectorAll('.btns .b').forEach(b=>{b.classList.remove('on');if(b.textContent.includes(S.n))b.classList.add('on')});document.getElementById('hintBtn').disabled=true;document.getElementById('hintCard').classList.remove('show')}
window.sel=function(n){S.n=n;save();upd();document.getElementById('q').textContent='Нажми «🎲 Новая задача»';document.getElementById('svg').innerHTML='';document.getElementById('ans').disabled=true;document.getElementById('chk').disabled=true;document.getElementById('sol').disabled=true;document.getElementById('fb').className='fb';document.getElementById('sol-box').classList.remove('show');document.getElementById('hintCard').classList.remove('show')};
window.ins=function(sym){const i=document.getElementById('ans');const s=i.selectionStart,e=i.selectionEnd,v=i.value;i.value=v.slice(0,s)+sym+v.slice(e);i.selectionStart=i.selectionEnd=s+sym.length;i.focus()};

function parse(str){
  if(!str)return NaN;
  str=str.toString().toLowerCase().trim().replace(/\s/g,'').replace(',','.');
  if(str.includes('/')){const[a,b]=str.split('/').map(Number);if(!isNaN(a)&&!isNaN(b)&&b!==0)return a/b}
  str=str.replace(/√\((\d+)\)/g,'√$1').replace(/\*/g,'');
  const m=str.match(/^(-?\d*\.?\d*)√(\d+)$/);
  if(m){const c=m[1]===''?1:parseFloat(m[1]);return c*Math.sqrt(parseInt(m[2]))}
  const n=parseFloat(str);return isNaN(n)?NaN:n;
}

window.check=function(){
  const v=document.getElementById('ans').value.trim();if(!v)return;
  if(S.task&&S.task.ans==='proof'){document.getElementById('fb').innerHTML='✅ <b>Доказательство!</b><br>Сверь ход с образцом.';document.getElementById('fb').className='fb p';document.getElementById('sol-box').textContent=S.task.sol;document.getElementById('sol-box').classList.add('show');return}
  const uv=parse(v),cv=parse(S.task.ans);const f=document.getElementById('fb');let ok=false;
  if(!isNaN(uv)&&!isNaN(cv)&&Math.abs(uv-cv)<0.02)ok=true;
  else if(String(v).toLowerCase().replace(/\s/g,'').replace(',','.')===String(S.task.ans).toLowerCase().replace(/\s/g,'').replace(',','.'))ok=true;
  if(ok){f.innerHTML='🎉 <b>Верно!</b><br>Ответ принят.';f.className='fb y';S.ok++}
  else{let h=S.task.hint||'💡 Повтори теорию.';f.innerHTML=`❌ <b>Неверно.</b><br>Правильно: <b>${S.task.ans}</b><br><br>${h}<br><br>📝 <i>Жми «Решение».</i>`;f.className='fb n'}
  S.solved++;save();document.getElementById('hintBtn').disabled=true;document.getElementById('hintCard').classList.remove('show');
};
window.toggleHint=function(){const c=document.getElementById('hintCard');if(c.classList.contains('show')){c.classList.remove('show');document.getElementById('hintBtn').textContent='💡 Показать подсказку'}else if(S.task&&S.task.hint){document.getElementById('hintText').textContent=S.task.hint;c.classList.add('show');document.getElementById('hintBtn').textContent='🔽 Скрыть подсказку'}};
window.showSol=function(){const b=document.getElementById('sol-box');if(b.classList.contains('show')){b.classList.remove('show');document.getElementById('sol').textContent='📝 Решение'}else{b.textContent=S.task.sol;b.classList.add('show');document.getElementById('sol').textContent='📝 Скрыть'}};
window.gen=function(){const pool=TASK_BANK[S.n];if(!pool||!pool.length)return;S.task=pool[Math.floor(Math.random()*pool.length)].f();document.getElementById('q').textContent=S.task.txt;draw(S.task.d,S.task.p);document.getElementById('ans').value='';document.getElementById('ans').disabled=false;document.getElementById('chk').disabled=false;document.getElementById('sol').disabled=false;document.getElementById('hintBtn').disabled=false;document.getElementById('fb').className='fb';document.getElementById('sol-box').classList.remove('show');document.getElementById('hintCard').classList.remove('show');document.getElementById('sol').textContent='📝 Решение';document.getElementById('hintBtn').textContent='💡 Показать подсказку'};

// 🎨 ОТРИСОВКА (ИСПРАВЛЕНО: буквы НЕ пересекают линии)
function draw(type,p){
  let s=`<svg viewBox="0 0 360 260" style="width:100%;max-width:320px;overflow:visible" role="img" aria-label="Геометрический чертёж">`;
  s+=`<style>.l{stroke:#334155;stroke-width:2;stroke-linecap:round;fill:none}.d{stroke:#334155;stroke-width:1.5;stroke-dasharray:4,3;fill:none}.b{stroke:#2563eb}.r{stroke:#dc2626}.lbl{fill:#334155;font-family:sans-serif;font-weight:600;font-size:16px;stroke:#fff;stroke-width:4px;paint-order:stroke fill}.val{fill:#2563eb;font-family:sans-serif;font-weight:600;font-size:15px;stroke:#fff;stroke-width:3px;paint-order:stroke fill}.ask{fill:#dc2626;font-weight:700;font-size:16px;stroke:#fff;stroke-width:3px;paint-order:stroke fill}.tick{stroke:#334155;stroke-width:2;fill:none}.rt{fill:none;stroke:#475569;stroke-width:1.5}.arc{fill:none;stroke:#f59e0b;stroke-width:2}</style>`;
  
  if(type==='triangle'){
    const A=[180,60],B=[60,200],C=[300,200];
    s+=`<polygon points="${A} ${B} ${C}" class="l"/>`;
    // Буквы ВЫНЕСЕНЫ за пределы треугольника
    s+=`<text x="180" y="45" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="35" y="220" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="325" y="220" text-anchor="middle" class="lbl">C</text>`;
    if(p.A)s+=`<text x="115" y="85" text-anchor="middle" class="val">${p.A}°</text>`;
    if(p.B)s+=`<text x="75" y="170" text-anchor="middle" class="val">${p.B}°</text>`;
    s+=`<text x="255" y="170" text-anchor="middle" class="ask">∠C=?</text>`;
  }
  else if(type==='bisector'){
    const A=[180,60],B=[60,200],C=[300,200],D=[180,200];
    s+=`<polygon points="${A} ${B} ${C}" class="l"/>`;
    s+=`<line x1="${A[0]}" y1="${A[1]}" x2="${D[0]}" y2="${D[1]}" class="b d"/>`;
    s+=`<text x="180" y="45" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="35" y="220" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="325" y="220" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="180" y="240" text-anchor="middle" class="lbl">D</text>`;
    if(p.alpha)s+=`<text x="115" y="85" text-anchor="middle" class="val">${p.alpha}°</text>`;
    s+=`<text x="180" y="145" text-anchor="middle" class="ask">∠BAD=?</text>`;
  }
  else if(type==='isosceles'){
    const A=[80,200],B=[280,200],C=[180,50];
    s+=`<polygon points="${A} ${B} ${C}" class="l"/>`;
    s+=`<line x1="120" y1="130" x2="125" y2="135" class="tick"/>`;
    s+=`<line x1="240" y1="130" x2="235" y2="135" class="tick"/>`;
    s+=`<text x="55" y="220" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="305" y="220" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="180" y="35" text-anchor="middle" class="lbl">C</text>`;
    if(p.base)s+=`<text x="180" y="240" text-anchor="middle" class="val">${p.base}</text>`;
    if(p.side)s+=`<text x="95" y="120" text-anchor="middle" class="val">${p.side}</text>`;
  }
  else if(type==='rectangle'){
    const x=50,y=70,w=260,h=120;
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" class="l"/>`;
    s+=`<rect x="${x+2}" y="${y+h-10}" width="8" height="8" class="rt"/>`;
    s+=`<text x="35" y="60" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="325" y="60" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="325" y="215" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="35" y="215" text-anchor="middle" class="lbl">D</text>`;
    if(p.a)s+=`<text x="180" y="45" text-anchor="middle" class="val">${p.a}</text>`;
    if(p.b)s+=`<text x="20" y="140" text-anchor="middle" class="val">${p.b}</text>`;
  }
  else if(type==='rhombus'){
    const cx=180,cy=130,dx=90,dy=60;
    s+=`<polygon points="${cx},${cy-dy} ${cx+dx},${cy} ${cx},${cy+dy} ${cx-dx},${cy}" class="l"/>`;
    s+=`<line x1="${cx-dx}" y1="${cy}" x2="${cx+dx}" y2="${cy}" class="d"/>`;
    s+=`<line x1="${cx}" y1="${cy-dy}" x2="${cx}" y2="${cy+dy}" class="d"/>`;
    s+=`<line x1="${cx-45}" y1="${cy-dy+30}" x2="${cx-40}" y2="${cy-dy+35}" class="tick"/>`;
    s+=`<line x1="${cx+45}" y1="${cy-dy+30}" x2="${cx+40}" y2="${cy-dy+35}" class="tick"/>`;
    s+=`<text x="180" y="45" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="300" y="140" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="180" y="220" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="60" y="140" text-anchor="middle" class="lbl">D</text>`;
  }
  else if(type==='circle'||type==='diameter_tri'){
    const O=[160,130],r=60;
    s+=`<circle cx="${O[0]}" cy="${O[1]}" r="${r}" class="l"/>`;
    s+=`<text x="160" y="160" text-anchor="middle" class="lbl">O</text>`;
    if(type==='diameter_tri'){
      s+=`<line x1="${O[0]-r}" y1="${O[1]}" x2="${O[0]+r}" y2="${O[1]}" class="b"/>`;
      s+=`<polygon points="${O[0]-r},${O[1]} ${O[0]+r},${O[1]} ${O[0]},${O[1]-r}" class="l"/>`;
      s+=`<rect x="${O[0]-4}" y="${O[1]-4}" width="8" height="8" class="rt"/>`;
      s+=`<text x="70" y="155" text-anchor="middle" class="lbl">A</text>`;
      s+=`<text x="250" y="155" text-anchor="middle" class="lbl">C</text>`;
      s+=`<text x="160" y="45" text-anchor="middle" class="lbl">B</text>`;
      if(p.A)s+=`<text x="95" y="85" text-anchor="middle" class="val">${p.A}°</text>`;
    }
  }
  else if(type==='tangent_chord_angle'){
    const O=[160,130],r=60;
    s+=`<circle cx="${O[0]}" cy="${O[1]}" r="${r}" class="l"/>`;
    s+=`<line x1="${O[0]+r}" y1="${O[1]}" x2="${O[0]+r+60}" y2="${O[1]-60}" class="b"/>`;
    s+=`<line x1="${O[0]+r}" y1="${O[1]}" x2="${O[0]-r}" y2="${O[1]}" class="d"/>`;
    s+=`<text x="160" y="160" text-anchor="middle" class="lbl">O</text>`;
    s+=`<text x="240" y="155" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="70" y="155" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="250" y="85" text-anchor="middle" class="ask">∠=?</text>`;
    s+=`<path d="M220 130 A30 30 0 0 1 235 115" class="arc"/>`;
  }
  else if(type==='trapezoid_similar'||type==='trapezoid_mid'||type==='trapezoid_diag_areas'||type==='isosceles_trap'){
    s+=`<polygon points="90,180 270,180 220,60 140,60" class="l"/>`;
    s+=`<line x1="90" y1="180" x2="220" y2="60" class="b d"/>`;
    s+=`<text x="65" y="210" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="295" y="210" text-anchor="middle" class="lbl">D</text>`;
    s+=`<text x="240" y="40" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="120" y="40" text-anchor="middle" class="lbl">B</text>`;
    if(p.a)s+=`<text x="180" y="205" text-anchor="middle" class="val">${p.a}</text>`;
    if(p.b)s+=`<text x="180" y="35" text-anchor="middle" class="val">${p.b}</text>`;
  }
  else if(type==='intersecting_chords'){
    s+=`<circle cx="180" cy="130" r="70" class="l"/>`;
    s+=`<line x1="110" y1="130" x2="250" y2="130" class="b"/>`;
    s+=`<line x1="130" y1="70" x2="230" y2="190" class="r"/>`;
    s+=`<text x="180" y="150" text-anchor="middle" class="lbl">K</text>`;
    s+=`<text x="85" y="155" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="275" y="155" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="105" y="50" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="250" y="215" text-anchor="middle" class="lbl">D</text>`;
  }
  else if(type==='right_alt_seg'){
    const A=[100,180],B=[260,180],C=[180,60],H=[180,180];
    s+=`<polygon points="${A} ${B} ${C}" class="l"/>`;
    s+=`<line x1="${C[0]}" y1="${C[1]}" x2="${H[0]}" y2="${H[1]}" class="b d"/>`;
    s+=`<rect x="${H[0]-4}" y="${H[1]-4}" width="8" height="8" class="rt"/>`;
    s+=`<rect x="${C[0]-4}" y="${C[1]-4}" width="8" height="8" class="rt"/>`;
    s+=`<text x="75" y="210" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="285" y="210" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="180" y="45" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="200" y="210" text-anchor="middle" class="lbl">H</text>`;
    if(p.AH)s+=`<text x="130" y="210" text-anchor="middle" class="val">AH=${p.AH}</text>`;
    if(p.CH)s+=`<text x="205" y="115" text-anchor="middle" class="val">CH=${p.CH}</text>`;
    if(p.BH!==undefined)s+=`<text x="235" y="210" text-anchor="middle" class="ask">BH=?</text>`;
  }
  else if(type==='proof_altitudes'||type==='proof_midpoint'){
    s+=`<polygon points="100,180 260,180 180,60" class="l"/>`;
    s+=`<line x1="180" y1="60" x2="180" y2="180" class="b d"/>`;
    s+=`<line x1="140" y1="180" x2="200" y2="120" class="r d"/>`;
    s+=`<rect x="176" y="176" width="8" height="8" class="rt"/>`;
    s+=`<text x="75" y="210" text-anchor="middle" class="lbl">A</text>`;
    s+=`<text x="285" y="210" text-anchor="middle" class="lbl">B</text>`;
    s+=`<text x="180" y="45" text-anchor="middle" class="lbl">C</text>`;
    s+=`<text x="180" y="210" text-anchor="middle" class="lbl">D</text>`;
    s+=`<text x="180" y="125" text-anchor="middle" class="lbl">H</text>`;
  }
  else{
    s+=`<text x="180" y="110" text-anchor="middle" fill="#334155" font-size="16" font-weight="600">📐 Задача</text>`;
  }
  s+=`</svg>`;document.getElementById('svg').innerHTML=s;
}

document.getElementById('chk').onclick=check;
document.getElementById('sol').onclick=showSol;
document.getElementById('ans').onkeydown=e=>{if(e.key==='Enter')check()};
init();
}catch(e){document.getElementById('err').innerHTML='❌ Критическая ошибка: '+e.message;document.getElementById('err').style.display='block'}
</script>
